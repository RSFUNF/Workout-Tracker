          </div>
        )}

        {/* Train Today */}
        <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>Train Today</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={()=>setView("home")} style={{background:C.CARD,border:`1px solid ${C.BORDER}`,borderRadius:14,padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%"}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:800,fontSize:16,color:"#818CF8",marginBottom:2}}>💪 Push / Pull / Legs</div>
              <div style={{fontSize:11,color:C.MUTED}}>Choose your day · manage exercises</div>
            </div>
            <div style={{color:C.MUTED,fontSize:18}}>›</div>
          </button>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setCustomExs({compounds:[],isolations:[]});setWorkout({});setLogging(null);setView("custom-workout");}} style={{flex:1,background:C.CARD,border:`1px solid ${C.BORDER}`,borderRadius:14,padding:"12px",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
              <div style={{fontWeight:700,fontSize:13,color:"#A78BFA"}}>✏️ CYOJ</div>
              <div style={{fontSize:10,color:C.MUTED,marginTop:2}}>Custom workout</div>
            </button>
            <button onClick={()=>setView("cardio-home")} style={{flex:1,background:C.CARD,border:`1px solid ${C.BORDER}`,borderRadius:14,padding:"12px",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
              <div style={{fontWeight:700,fontSize:13,color:"#06B6D4"}}>🏃 Cardio</div>
              <div style={{fontSize:10,color:C.MUTED,marginTop:2}}>Treadmill · Bike</div>
            </button>
            <button onClick={()=>setView("activities")} style={{flex:1,background:C.CARD,border:`1px solid ${C.BORDER}`,borderRadius:14,padding:"12px",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
              <div style={{fontWeight:700,fontSize:13,color:"#F59E0B"}}>📋 Log</div>
              <div style={{fontSize:10,color:C.MUTED,marginTop:2}}>Activities</div>
            </button>
          </div>
        </div>
      </div>
    );
  }

  if(view==="cardio-home"){
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        <button onClick={()=>setView("main")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>←</button>
        <div style={{fontSize:10,color:C.MUTED,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:4}}>Cardio</div>
        <div style={{fontSize:24,fontWeight:800,marginBottom:24}}>Choose Machine</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {Object.entries(CARDIO).map(([key,m])=>{
            const last=lastCardioSession(cardioSessions,key);
            return(
              <div key={key} style={{background:C.CARD,borderRadius:16,padding:"16px 18px",border:`1px solid ${C.BORDER}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><div style={{width:8,height:8,borderRadius:"50%",background:m.color}}/><div style={{fontWeight:800,fontSize:17}}>{m.label}</div></div>
                  {last&&<div style={{fontSize:11,color:C.MUTED}}>Last: {fmtDate(last.date)} - {totalDuration(last.blocks)} min</div>}
                </div>
                <button onClick={()=>startCardio(key)} style={btn(m.color,"#0E0E15",{padding:"10px 18px",fontSize:13,borderRadius:12,flexShrink:0,marginLeft:12})}>Start</button>
              </div>
            );
          })}
        </div>
        {cardioSessions.length>0&&<button onClick={()=>setView("cardio-history")} style={btn("transparent",C.MUTED,{width:"100%",padding:"13px",fontSize:13,border:`1px solid ${C.BORDER}`,borderRadius:14})}>View Cardio History ({cardioSessions.length})</button>}
      </div>
    );
  }

  if(view==="cardio-history"){
    const sorted=[...cardioSessions].sort((a,b)=>b.ts-a.ts);
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        <button onClick={()=>setView("cardio-home")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>←</button>
        <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>Cardio History</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {sorted.map(s=>{
            const m=CARDIO[s.machine],open=cardioHistOpen===s.id;
            return(
              <div key={s.id} style={{background:C.CARD,borderRadius:14,border:`1px solid ${C.BORDER}`,overflow:"hidden"}}>
                <div onClick={()=>setCardioHistOpen(open?null:s.id)} style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><div style={{width:6,height:6,borderRadius:"50%",background:m.color}}/><div style={{fontWeight:700,fontSize:14}}>{m.label}</div></div>
                    <div style={{fontSize:12,color:C.MUTED}}>{fmtDate(s.date)} - {s.blocks.length} blocks - {totalDuration(s.blocks)} min</div>
                  </div>
                  <div style={{color:C.MUTED,fontSize:14,marginLeft:12}}>{open?"^":"v"}</div>
                </div>
                {open&&(
                  <div style={{padding:"0 16px 14px",borderTop:`1px solid ${C.BORDER}`}}>
                    {s.blocks.map((block,i)=>(
                      <div key={i} style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:6}}>
                        <div style={{fontSize:10,color:C.MUTED,width:"100%"}}>Block {i+1}</div>
                        {CARDIO[s.machine].fields.map(f=><div key={f.key} style={{background:C.CARD2,border:`1px solid ${C.BORDER}`,borderRadius:8,padding:"4px 10px",fontSize:12,color:C.MUTED,fontWeight:600}}>{block[f.key]} {f.unit}</div>)}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if(view==="cardio-session"&&cardioMachine){
    const m=CARDIO[cardioMachine];
    const prevSession=lastCardioSession(cardioSessions,cardioMachine);
    const currentTotal=totalDuration(cardioBlocks);
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",paddingBottom:SAB}}>
        <div style={{position:"sticky",top:0,zIndex:10,background:C.BG,borderBottom:`1px solid ${C.BORDER}`,padding:`${PAD} 20px 14px`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setShowCardioExitModal(true)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.MUTED,fontSize:22,padding:"4px 8px 4px 0",lineHeight:1,fontFamily:"inherit"}}>←</button>
              <div>
                <div style={{fontWeight:800,fontSize:18,color:m.color}}>{m.label}</div>
                <div style={{fontSize:11,color:C.MUTED}}>{cardioBlocks.length} blocks - {currentTotal} min</div>
              </div>
            </div>
            <button onClick={()=>setShowCardioExitModal(true)} style={btn("#22C55E","#0E0E15",{padding:"9px 16px",fontSize:13,borderRadius:12})}>Finish</button>
          </div>
        </div>
        <div style={{padding:"16px 20px"}}>
          {prevSession&&(
            <div style={{background:C.CARD,borderRadius:14,padding:"12px 14px",marginBottom:12,border:`1px solid ${C.BORDER}`}}>
              <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Last - {fmtDate(prevSession.date)} - {totalDuration(prevSession.blocks)} min</div>
              {prevSession.blocks.map((block,i)=>(
                <div key={i} style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:i<prevSession.blocks.length-1?4:0}}>
                  <div style={{fontSize:11,color:"#44475A",minWidth:44}}>Block {i+1}</div>
                  {m.fields.map(f=><div key={f.key} style={{fontSize:11,color:"#44475A"}}>{block[f.key]}{f.unit}{f!==m.fields[m.fields.length-1]?" ·":""}</div>)}
                </div>
              ))}
            </div>
          )}
          {cardioBlocks.map((block,i)=>(
            <div key={i} style={{background:C.CARD,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.BORDER}`}}>
              <div style={{fontSize:11,color:C.MUTED,fontWeight:700,marginBottom:8}}>Block {i+1}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {m.fields.map(f=>(
                  <div key={f.key} style={{background:"#13131C",borderRadius:8,padding:"5px 10px",border:`1px solid ${C.BORDER}`}}>
                    <div style={{fontSize:9,color:C.MUTED,marginBottom:1}}>{f.label}</div>
                    <div style={{fontSize:14,fontWeight:800,color:"#C0C4D8"}}>{block[f.key]} <span style={{fontSize:10,fontWeight:400,color:C.MUTED}}>{f.unit}</span></div>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {cardioLogging?(
            <div style={{background:C.CARD,borderRadius:14,padding:"14px",border:`1px solid ${C.BORDER}`,marginBottom:10}}>
              <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.06em",marginBottom:12}}>Block {cardioBlocks.length+1}</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                {m.fields.map(f=>(
                  <div key={f.key} style={{flex:1,minWidth:70}}>
                    <div style={{fontSize:10,color:C.MUTED,marginBottom:4,letterSpacing:"0.1em"}}>{f.label} ({f.unit})</div>
                    <input type="number" inputMode={f.mode} value={cardioLogState[f.key]||""} onChange={e=>setCardioLogState(s=>({...s,[f.key]:e.target.value}))} placeholder="0" style={{width:"100%",padding:"10px 11px",borderRadius:11,background:C.CARD2,border:"1.5px solid #3A3A4A",color:C.TEXT,fontSize:20,fontWeight:800,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={submitCardioBlock} style={btn("#F0F0F4","#0E0E15",{flex:1,padding:"12px",fontSize:14,borderRadius:12})}>Log Block</button>
                <button onClick={()=>setCardioLogging(false)} style={btn(C.CARD2,C.MUTED,{padding:"12px 14px",fontSize:14,border:`1px solid ${C.BORDER}`,borderRadius:12})}>X</button>
              </div>
            </div>
          ):(
            <button onClick={openCardioLogger} style={btn("transparent",C.MUTED,{width:"100%",padding:"12px",fontSize:13,border:"1px solid #3A3A4A",borderRadius:14})}>+ Log Block {cardioBlocks.length+1}</button>
          )}
        </div>
        {showCardioExitModal&&(
          <div onClick={()=>setShowCardioExitModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:`0 16px ${SAB}`}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.CARD,borderRadius:20,padding:"24px 20px",width:"100%",maxWidth:440,border:`1px solid ${C.BORDER}`}}>
              <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>Finish session?</div>
              <div style={{fontSize:13,color:C.MUTED,marginBottom:22}}>{cardioBlocks.length} blocks - {currentTotal} min total</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <button onClick={finishCardio} style={btn("#F0F0F4","#0E0E15",{width:"100%",padding:"14px",fontSize:15,borderRadius:12})}>Save and Exit</button>
                <button onClick={()=>{setShowCardioExitModal(false);setView("cardio-home");}} style={btn("#2A1A1A","#E07070",{width:"100%",padding:"14px",fontSize:15,borderRadius:12,border:"1px solid #4A2A2A"})}>Discard</button>
                <button onClick={()=>setShowCardioExitModal(false)} style={btn("transparent",C.MUTED,{width:"100%",padding:"12px",fontSize:14,borderRadius:12})}>Cancel</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  if(view==="home"){
    const lastOf=(d)=>[...sessions].filter(s=>s.day===d).sort((a,b)=>b.date.localeCompare(a.date))[0];
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        <button onClick={()=>setView("main")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 16px"})}>←</button>
        <div style={{fontSize:10,color:C.MUTED,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:4}}>Strength</div>
        <div style={{fontSize:24,fontWeight:800,marginBottom:6}}>Push / Pull / Legs</div>
        <div style={{fontSize:12,color:C.MUTED,marginBottom:24,lineHeight:1.5}}>One working set. Hit {REP_TARGET} reps to add weight next session.</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          {["push","pull","legs"].map(d=>{
            const meta=WORKOUT_META[d];
            const last=lastOf(d);
            const ready=countReady(sessions,d,workoutConfig);
            const cfg=getConfig(d);
            const total=cfg.compounds.length+cfg.isolations.length;
            return(
              <div key={d} style={{background:C.CARD,borderRadius:16,padding:"16px",border:`1px solid ${C.BORDER}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:meta.color}}/>
                    <div style={{fontWeight:800,fontSize:18,color:meta.color}}>{meta.label.toUpperCase()}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{setManageDay(d);setView("manage");}} style={btn(C.CARD2,C.MUTED,{fontSize:11,padding:"5px 10px",border:`1px solid ${C.BORDER}`,borderRadius:8})}>Manage</button>
                    <button onClick={()=>startPplWorkout(d)} style={btn(meta.color,"#0E0E15",{padding:"8px 16px",fontSize:13,borderRadius:10})}>Start</button>
                  </div>
                </div>
                <div style={{fontSize:12,color:C.MUTED}}>{total} exercises - {cfg.compounds.length} compounds</div>
                {last&&<div style={{fontSize:11,color:C.MUTED,marginTop:2}}>Last: {fmtDate(last.date)}</div>}
                {ready&&<div style={{fontSize:11,fontWeight:700,marginTop:3,color:ready.ready>0?"#D0D4E8":C.MUTED}}>{ready.ready>0?`${ready.ready}/${ready.total} compounds ready to progress`:`${ready.total} compounds - keep building`}</div>}
              </div>
            );
          })}
        </div>
        {sessions.length>0&&<button onClick={()=>setView("history")} style={btn("transparent",C.MUTED,{width:"100%",padding:"13px",fontSize:13,border:`1px solid ${C.BORDER}`,borderRadius:14})}>View History ({sessions.length} sessions)</button>}
      </div>
    );
  }

  if(view==="history"){
    const sorted=[...sessions].sort((a,b)=>b.ts-a.ts);
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        <button onClick={()=>setView("home")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>←</button>
        <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>PPL History</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {sorted.map(s=>{
            const meta=WORKOUT_META[s.day]||{label:s.day,color:C.MUTED};
            const setCount=Object.values(s.exercises||{}).reduce((a,sets)=>a+(sets?.length||0),0);
            const exCount=Object.keys(s.exercises||{}).filter(k=>s.exercises[k]?.length>0).length;
            const open=histOpen===s.id;
            const comps=(DEFAULT_CONFIG[s.day]?.compounds||[]).map(exByName).filter(ex=>!ex.special&&!ex.iso);
            const readyCount=comps.filter(ex=>hitProgression(s.exercises?.[ex.name])).length;
            return(
              <div key={s.id} style={{background:C.CARD,borderRadius:14,border:`1px solid ${C.BORDER}`,overflow:"hidden"}}>
                <div onClick={()=>setHistOpen(open?null:s.id)} style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><div style={{width:6,height:6,borderRadius:"50%",background:meta.color}}/><div style={{fontWeight:700,fontSize:14}}>{meta.label}</div></div>
                    <div style={{fontSize:12,color:C.MUTED}}>{fmtDate(s.date)} - {exCount} exercises - {setCount} sets</div>
                    {readyCount>0&&<div style={{fontSize:11,color:"#D0D4E8",fontWeight:600,marginTop:2}}>{readyCount} compound{readyCount>1?"s":""} ready to progress</div>}
                  </div>
                  <div style={{color:C.MUTED,fontSize:14,marginLeft:12}}>{open?"^":"v"}</div>
                </div>
                {open&&(
                  <div style={{padding:"0 16px 14px",borderTop:`1px solid ${C.BORDER}`}}>
                    {Object.entries(s.exercises||{}).filter(([,sets])=>sets?.length>0).map(([name,sets])=>(
                      <div key={name} style={{marginTop:12}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          <div style={{fontSize:12,fontWeight:700,color:"#C8C8D4"}}>{name}</div>
                          {hitProgression(sets)&&<div style={{fontSize:9,color:"#D0D4E8",fontWeight:700}}>PROGRESS</div>}
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                          {sets.map((set,i)=><div key={i} style={{background:C.CARD2,border:`1px solid ${C.BORDER}`,borderRadius:8,padding:"4px 10px",fontSize:11,color:C.MUTED,fontWeight:600}}>{set.weight>0?`${set.weight}kg × ${set.reps}`:`BW × ${set.reps}`}</div>)}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if(view==="custom-workout"){
    const allCustomExs=[...customExs.compounds.map(exByName),...customExs.isolations.map(exByName)];
    const doneCount=allCustomExs.filter(ex=>(workout[ex.name]?.length||0)>=1).length;
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",paddingBottom:SAB}}>
        <div style={{position:"sticky",top:0,zIndex:10,background:C.BG,borderBottom:`1px solid ${C.BORDER}`,padding:`${PAD} 20px 14px`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:timer.on?10:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setShowExitModal(true)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.MUTED,fontSize:22,padding:"4px 8px 4px 0",lineHeight:1,fontFamily:"inherit"}}>←</button>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>Choose Your Own Journey</div>
                <div style={{fontSize:11,color:C.MUTED,marginTop:1}}>{doneCount} of {allCustomExs.length} done</div>
              </div>
            </div>
            <button onClick={()=>setShowExitModal(true)} style={btn("#22C55E","#0E0E15",{padding:"9px 16px",fontSize:13,borderRadius:12})}>Finish</button>
          </div>
          {timer.on&&(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,height:4,background:"#22222F",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(timer.secs/timer.max)*100}%`,background:"#22C55E",transition:"width 1s linear"}}/>
              </div>
              <div style={{fontSize:14,fontWeight:800,color:"#22C55E",minWidth:36}}>{fmtTimer(timer.secs)}</div>
              <button onClick={skipTimer} style={btn(C.CARD,C.MUTED,{fontSize:11,padding:"4px 10px",borderRadius:8})}>Skip</button>
            </div>
          )}
        </div>
        <div style={{padding:"14px 20px"}}>
          <WarmupCard exercises={WARMUPS.custom}/>
          {customExs.compounds.length>0&&<div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>Compounds</div>}
          {customExs.compounds.map(name=>{const ex=exByName(name);return <ExCard key={name} {...exCardProps(ex,"custom",5)}/>;} )}
          {customExs.isolations.length>0&&<div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8,marginTop:14}}>Isolations</div>}
          {customExs.isolations.map(name=>{const ex=exByName(name);return <ExCard key={name} {...exCardProps(ex,"custom",2.5)}/>;} )}
          <button onClick={()=>openLibrary({mode:"custom",prev:"custom-workout"})} style={btn("transparent","#A78BFA",{width:"100%",padding:"12px",fontSize:13,border:"1px solid #A78BFA44",borderRadius:14,marginTop:allCustomExs.length>0?16:0})}>
            + Add Exercise from Library
          </button>
        </div>
        {showExitModal&&(
          <div onClick={()=>setShowExitModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:`0 16px ${SAB}`}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.CARD,borderRadius:20,padding:"24px 20px",width:"100%",maxWidth:440,border:`1px solid ${C.BORDER}`}}>
              <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>Leave workout?</div>
              <div style={{fontSize:13,color:C.MUTED,marginBottom:22}}>{Object.values(workout).reduce((a,s)=>a+s.length,0)} sets logged</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <button onClick={()=>finishWorkout("custom")} style={btn("#22C55E","#0E0E15",{width:"100%",padding:"14px",fontSize:15,borderRadius:12})}>Save and Exit</button>
                <button onClick={()=>{setShowExitModal(false);setView("main");}} style={btn("#2A1A1A","#E07070",{width:"100%",padding:"14px",fontSize:15,borderRadius:12,border:"1px solid #4A2A2A"})}>Discard</button>
                <button onClick={()=>setShowExitModal(false)} style={btn("transparent",C.MUTED,{width:"100%",padding:"12px",fontSize:14,borderRadius:12})}>Cancel</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const meta=WORKOUT_META[pplDay];
  const dc=meta.color;
  const {compounds,isolations}=getWorkoutExercises(pplDay,workoutConfig);
  const allEx=[...compounds,...isolations];
  const doneCount=allEx.filter(ex=>(workout[ex.name]?.length||0)>=1).length;

  return(
    <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",paddingBottom:SAB}}>
      <div style={{position:"sticky",top:0,zIndex:10,background:C.BG,borderBottom:`1px solid ${C.BORDER}`,padding:`${PAD} 20px 14px`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setShowExitModal(true)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.MUTED,fontSize:22,padding:"4px 8px 4px 0",lineHeight:1,fontFamily:"inherit"}}>←</button>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:dc}}/>
                <div style={{fontWeight:800,fontSize:18,color:dc}}>{meta.label} Day</div>
              </div>
              <div style={{fontSize:11,color:C.MUTED,marginTop:1}}>{doneCount} of {allEx.length} working sets logged</div>
            </div>
          </div>
          <button onClick={()=>setShowExitModal(true)} style={btn("#22C55E","#0E0E15",{padding:"9px 16px",fontSize:13,borderRadius:12})}>Finish</button>
        </div>
        <div style={{height:3,background:"#22222F",borderRadius:2,overflow:"hidden",marginBottom:timer.on?10:0}}>
          <div style={{height:"100%",width:`${allEx.length>0?(doneCount/allEx.length)*100:0}%`,background:"#5A5A6A",transition:"width 0.4s"}}/>
        </div>
        {timer.on&&(
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,height:4,background:"#22222F",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(timer.secs/timer.max)*100}%`,background:"#22C55E",transition:"width 1s linear"}}/>
            </div>
            <div style={{fontSize:14,fontWeight:800,color:"#22C55E",minWidth:36}}>{fmtTimer(timer.secs)}</div>
            <button onClick={skipTimer} style={btn(C.CARD,C.MUTED,{fontSize:11,padding:"4px 10px",borderRadius:8})}>Skip</button>
          </div>
        )}
      </div>
      <div style={{padding:"16px 20px"}}>
        {(pplDay==="legs"||pplDay==="pull")&&meta.protocol&&(
          <div style={{background:"#1A0E0E",border:"1px solid #3D1A1A",borderRadius:14,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,color:"#F97316",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Protocol</div>
            {meta.protocol.map((r,i)=><div key={i} style={{fontSize:11,color:"#DDB0A0",marginBottom:i<meta.protocol.length-1?3:0}}>- {r}</div>)}
          </div>
        )}
        <WarmupCard exercises={WARMUPS[pplDay]||[]}/>
        <SessionTargets compounds={compounds} isolations={isolations} sessions={sessions} day={pplDay}/>
        <div style={{background:C.CARD,borderLeft:"3px solid #3A3A4A",borderRadius:"0 14px 14px 0",padding:"11px 14px",marginBottom:18}}>
          <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Warmup Ramp - First compound only</div>
          <div style={{display:"flex",gap:4,marginBottom:6}}>
            {[["50%","×8"],["70%","×5"],["85%","×3"],["→","Work"]].map(([p,r],i)=>(
              <div key={i} style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:700,color:i===3?"#C0C4D8":C.TEXT}}>{p}</div>
                <div style={{fontSize:10,color:C.MUTED,marginTop:1}}>{r}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:C.MUTED}}>2nd compound: 2 touch sets - 3rd+: 1 light set</div>
        </div>
        <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>Compounds</div>
        {compounds.map(ex=><ExCard key={ex.name} {...exCardProps(ex,pplDay,5)}/>)}
        <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8,marginTop:16}}>Isolations</div>
        {isolations.map(ex=><ExCard key={ex.name} {...exCardProps(ex,pplDay,2.5)}/>)}
      </div>
      {showExitModal&&(
        <div onClick={()=>setShowExitModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:`0 16px ${SAB}`}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.CARD,borderRadius:20,padding:"24px 20px",width:"100%",maxWidth:440,border:`1px solid ${C.BORDER}`}}>
            <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>Leave workout?</div>
            <div style={{fontSize:13,color:C.MUTED,marginBottom:22}}>{Object.values(workout).reduce((a,s)=>a+s.length,0)} sets logged</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>finishWorkout(pplDay)} style={btn("#22C55E","#0E0E15",{width:"100%",padding:"14px",fontSize:15,borderRadius:12})}>Save and Exit</button>
              <button onClick={()=>{setShowExitModal(false);setView("home");}} style={btn("#2A1A1A","#E07070",{width:"100%",padding:"14px",fontSize:15,borderRadius:12,border:"1px solid #4A2A2A"})}>Discard</button>
              <button onClick={()=>setShowExitModal(false)} style={btn("transparent",C.MUTED,{width:"100%",padding:"12px",fontSize:14,borderRadius:12})}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
