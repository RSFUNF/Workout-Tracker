<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tracker">
  <title>Workout Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; background: #0E0E15; }
    body { min-height: 100%; background: #0E0E15; color: #F0F0F4; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; overscroll-behavior: none; }
    * { touch-action: manipulation; }
    #root { min-height: 100svh; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    const _warn = console.warn.bind(console);
    console.warn = (...args) => { if (String(args[0]).includes('Babel')) return; _warn(...args); };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
  const { useState, useEffect, useRef } = React;

  const C = { BG:"#0E0E15",CARD:"#1C1C27",CARD2:"#161620",BORDER:"#2A2A38",MUTED:"#9093A8",TEXT:"#F0F0F4" };
  const SAB = `calc(env(safe-area-inset-bottom) + 24px)`;
  const PAD = `calc(env(safe-area-inset-top) + 28px)`;
  const btn = (bg,color,extra={}) => ({ border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontFamily:"inherit",WebkitAppearance:"none",background:bg,color,...extra });

  // ─── PPL Data ─────────────────────────────────────────────────────────────────
  const PHASES = {
    1:{compSets:4,compReps:"10", rir:"RIR 3–4",isoReps:"12–15",restComp:120,restIso:90,color:"#60A5FA",weeks:"Wks 1–3"},
    2:{compSets:4,compReps:"7–8",rir:"RIR 2–3",isoReps:"10–12",restComp:150,restIso:90,color:"#FBBF24",weeks:"Wks 4–7"},
    3:{compSets:5,compReps:"4–5",rir:"RIR 1–2",isoReps:"10–12",restComp:240,restIso:90,color:"#F97316",weeks:"Wks 8–12"},
  };
  const WORKOUTS = {
    push:{label:"Push",color:"#818CF8",protocol:null,compounds:[
      {name:"Shoulder Press Machine",         warmup:"Full ramp",    note:"Seat back — 2 holes visible",   p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
      {name:"Incline Press Machine",           warmup:"2 touch sets: first at ~40% of your working weight × 6 reps (movement groove only, nothing taxing), then ~60% × 4 reps. Both should feel easy — you're priming the muscles, not fatiguing them.", note:"1 hole, narrow grip",           p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
      {name:"Chest Press Machine",             warmup:"1 light set",  note:"",                              p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
    ],isolations:[
      {name:"Side Lateral Raise",              sets:"3",reps:"12–15",note:"Cable, DB, or lying cable"},
      {name:"Cable Incline / Low-High Flye",   sets:"3",reps:"12",   note:"Controlled stretch at bottom"},
      {name:"Pec Dec Machine",                 sets:"3",reps:"12–15",note:""},
      {name:"2 Rope Overhead Extension",       sets:"3",reps:"12",   note:"Flat bottom ropes, elbows locked"},
      {name:"2 Rope Kneeling Tricep Pushdown", sets:"3",reps:"12–15",note:"Full lockout every rep"},
    ]},
    pull:{label:"Pull",color:"#34D399",protocol:null,compounds:[
      {name:"Pull-Ups",                        warmup:"Scapular pulls · slow negatives · half reps",note:"Add weight at 8+ reps per set",special:"3 × AMRAP"},
      {name:"Wide Straight Bar Lat Pulldown",  warmup:"2 touch sets: ~40% × 6 reps to wake the lats up, then ~60% × 4 reps. Focus on feeling the lat engage on both — not just going through the motion.", note:"Full hang at top",            p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
      {name:"Wide Straight Bar Cable Row",     warmup:"1 light set",   note:"Row to lower sternum",        p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
      {name:"Narrow Grip Lat Pulldown",        warmup:"1 light set",   note:"Longer ROM",                  p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:4,reps:"4–5"}},
      {name:"Narrow Grip Cable Row",           warmup:"Go straight in",note:"Fully warm at this point",    p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:4,reps:"4–5"}},
      {name:"2 Rope Straight Arm Pushdown",    warmup:"",              note:"Full lat stretch at top",     iso:true,sets:"3",reps:"12–15"},
    ],isolations:[
      {name:"Recline DB Curl",      sets:"3",reps:"10–12",note:"Full stretch at the bottom"},
      {name:"Recline Hammer Curl",  sets:"3",reps:"10–12",note:"Neutral grip, same bench"},
      {name:"Preacher Curl Machine",sets:"3",reps:"10–12",note:"Full squeeze at top"},
    ]},
    legs:{label:"Legs",color:"#FB7185",protocol:[
      "Walk 5 min before lifting — not optional in Phase 3",
      "Walk 2–3 min between heavy sets — do not sit",
      "Rest 3 min in Phase 2 · 4–5 min in Phase 3",
      "Exhale on the way up — no prolonged breath-hold",
      "Dizzy / pale / sweating → rack it, walk, breathe slow",
    ],compounds:[
      {name:"Stiff-Legged Deadlift", warmup:"Full ramp",    note:"Hip hinge first — lower vasovagal risk",   p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
      {name:"Hack Squat",            warmup:"Full ramp",    note:"⚠️ Highest risk — walk between every set", p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:5,reps:"4–5"}},
      {name:"Leg Press / Belt Squat",warmup:"2 touch sets: ~40% × 6 reps, then ~60% × 4 reps. Your legs are already warm from the Hack Squat so keep these brief — just enough to adjust to the different movement pattern and load path.", note:"Keep 2+ RIR — already well loaded",        p1:{sets:4,reps:"10"},p2:{sets:4,reps:"7–8"},p3:{sets:4,reps:"5–6"}},
      {name:"Hip Thrust",            warmup:"1 light set",  note:"Lower CV demand — can push heavier",       p1:{sets:3,reps:"10–12"},p2:{sets:4,reps:"8–10"},p3:{sets:4,reps:"6–8"}},
    ],isolations:[
      {name:"Leg Extension (single leg)", sets:"3",  reps:"12–15",note:""},
      {name:"Hamstring Curl (single leg)",sets:"3",  reps:"12–15",note:""},
      {name:"Abductor / Adductor Machine",sets:"2–3",reps:"15–20",note:"Each direction — flush set"},
      {name:"Calf Raise",                 sets:"3–4",reps:"12–20",note:"3 sec eccentric every rep"},
    ]},
  };
  const CYCLE_TARGETS = {1:3,2:4,3:5};

  // ─── Cardio Data ──────────────────────────────────────────────────────────────
  const CARDIO = {
    treadmill:{
      label:"Treadmill",color:"#06B6D4",
      fields:[
        {key:"duration",  label:"Duration", unit:"min",  mode:"decimal"},
        {key:"speed",     label:"Speed",    unit:"km/h", mode:"decimal"},
        {key:"incline",   label:"Incline",  unit:"%",    mode:"decimal"},
      ]
    },
    elliptical:{
      label:"Elliptical",color:"#A78BFA",
      fields:[
        {key:"duration",   label:"Duration",   unit:"min", mode:"decimal"},
        {key:"resistance", label:"Resistance", unit:"lvl", mode:"numeric"},
      ]
    },
    bike:{
      label:"Bike",color:"#F59E0B",
      fields:[
        {key:"duration",   label:"Duration",   unit:"min",  mode:"decimal"},
        {key:"resistance", label:"Resistance", unit:"lvl",  mode:"numeric"},
        {key:"rpm",        label:"RPM",        unit:"rpm",  mode:"numeric"},
      ]
    },
  };

  // ─── Storage ──────────────────────────────────────────────────────────────────
  const STORE_KEY = 'tracker:v3';
  function loadStore() {
    try {
      const d=localStorage.getItem(STORE_KEY);
      if(!d) return {phase:1,sessions:[],phaseStartedAt:Date.now(),cardioSessions:[]};
      const p=JSON.parse(d);
      if(!p.phaseStartedAt) p.phaseStartedAt=Date.now();
      if(!p.cardioSessions) p.cardioSessions=[];
      return p;
    } catch { return {phase:1,sessions:[],phaseStartedAt:Date.now(),cardioSessions:[]}; }
  }
  function saveStore(data) {
    try { localStorage.setItem(STORE_KEY,JSON.stringify(data)); } catch(e) { console.error(e); }
  }

  // ─── Helpers ──────────────────────────────────────────────────────────────────
  const todayStr = () => new Date().toISOString().split("T")[0];
  const fmtDate  = (s) => new Date(s+"T12:00:00").toLocaleDateString("en-NZ",{weekday:"short",day:"numeric",month:"short"});
  const fmtTimer = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const totalDuration = (blocks) => blocks.reduce((a,b)=>a+(parseFloat(b.duration)||0),0);

  function targetSets(ex,phase) { if(ex.special) return 3; if(ex.iso) return parseInt(ex.sets)||3; return ex[`p${phase}`]?.sets||4; }
  function targetLabel(ex,phase) { if(ex.special) return ex.special; if(ex.iso) return `${ex.sets} × ${ex.reps}`; const p=ex[`p${phase}`]; return p?`${p.sets} × ${p.reps}`:"—"; }
  function getTopReps(s) { const n=(s||"").match(/\d+/g); return n?parseInt(n[n.length-1]):10; }
  function checkProgression(ex,phase,sets) { if(ex.special||ex.iso||!ex[`p${phase}`]) return null; const t=targetSets(ex,phase); if(sets.length<t) return null; return sets.every(s=>s.reps>=getTopReps(ex[`p${phase}`].reps)); }
  function getLastSets(sessions,day,name) { const p=[...sessions].filter(s=>s.day===day&&s.exercises?.[name]?.length>0).sort((a,b)=>b.date.localeCompare(a.date)); return p.length?p[0].exercises[name]:null; }
  function countCycles(sessions,phase,psa) { const ps=sessions.filter(s=>s.phase===phase&&s.ts>=(psa||0)); return Math.min(ps.filter(s=>s.day==="push").length,ps.filter(s=>s.day==="pull").length,ps.filter(s=>s.day==="legs").length); }
  function countReady(sessions,day,phase) {
    const last=[...sessions].filter(s=>s.day===day).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(!last) return null;
    const comps=WORKOUTS[day].compounds.filter(ex=>!ex.special&&!ex.iso&&ex[`p${phase}`]);
    if(!comps.length) return null;
    const ready=comps.filter(ex=>{ const sets=last.exercises?.[ex.name]; return sets?.length&&checkProgression(ex,phase,sets)===true; });
    return {ready:ready.length,total:comps.length};
  }
  function lastCardioSession(cardioSessions,machine) {
    return [...cardioSessions].filter(s=>s.machine===machine).sort((a,b)=>b.ts-a.ts)[0]||null;
  }

  // ─── Exercise Info ─────────────────────────────────────────────────────────────
  const EXERCISE_INFO = {
    "Shoulder Press Machine":{setup:["Seat all the way back — 2 holes visible. This positions the shoulder joint more favourably and targets the medial deltoid.","Adjust height so handles sit at shoulder level.","Grip just outside shoulder width."],cues:["Drive straight up through the midline of your shoulder — not forward.","Full lockout at the top, pause briefly.","2–3 second controlled descent.","Keep your core braced and lower back pressed into the pad throughout."],watchOut:["Elbows drifting forward turns this into an incline press — keep them directly under your wrists.","Avoid shrugging at the top.","Don't use momentum — the descent is half the work."]},
    "Incline Press Machine":{setup:["One hole visible on the seat setting — this creates the incline angle targeting upper chest.","Narrow grip — hands closer than shoulder width emphasises the inner upper chest.","Retract your shoulder blades and press them into the pad before each set.","2 touch sets before your working sets: first at ~40% of your working weight × 6 reps (just grooving the movement, nothing taxing), then ~60% × 4 reps. Both should feel very easy — you're priming the muscles, not fatiguing them."],cues:["Initiate from the chest, not the shoulders.","Think about squeezing your pecs together at the top.","Full stretch at the bottom — don't short-range it.","Exhale on the way up."],watchOut:["Shoulders rolling forward under load — keep blades retracted the whole time.","Don't let the weight drift wide — keep the path tight.","Avoid bouncing at the bottom."]},
    "Chest Press Machine":{setup:["Seat height so handles are at mid-chest level.","Sit upright with full back contact on the pad.","Grip the handles with a neutral wrist — don't let them break back."],cues:["Think about pushing the floor away through your chest, not your arms.","Squeeze hard at full extension.","Controlled return — don't let the stack pull you back."],watchOut:["Elbows flaring too wide increases shoulder impingement risk — keep them at about 45–60 degrees.","Losing back contact with the pad as you push.","Triceps dominating — if your triceps are burning more than your chest, the seat may be too low."]},
    "Side Lateral Raise":{setup:["Slight forward lean at the hip — this positions the medial deltoid more directly under the load.","Arm slightly bent throughout — don't lock the elbow.","Cable at lowest setting gives the best resistance curve; dumbbells work fine too."],cues:["Lead with the elbow, not the wrist — imagine pouring a jug.","Raise to just at or slightly below shoulder height.","Brief pause at the top.","Slow, controlled descent — 3 seconds down."],watchOut:["Shrugging at the top (traps taking over) — keep your neck long.","Swinging or using momentum.","Raising above shoulder height increases impingement risk."]},
    "Cable Incline / Low-High Flye":{setup:["Cables at the lowest setting for low-to-high.","Slight forward lean, arms slightly bent — maintain this bend throughout.","Step away from the stack so there's tension even at the start."],cues:["Wide arc — like hugging a barrel or a very large tree.","The stretch at the bottom is the point — don't rush past it.","Squeeze the chest hard as your hands come together at the top."],watchOut:["Too much elbow bend turns this into a press — maintain the fixed angle.","Going too heavy destroys the arc movement.","Don't let your shoulders roll forward — chest proud throughout."]},
    "Pec Dec Machine":{setup:["Adjust so arms are at shoulder height — not higher.","Use the arm pads, not the handles if available — keeps tension on the chest longer.","Sit tall with your back fully against the pad."],cues:["Initiate from the elbows, not the hands — think about bringing elbows together.","Squeeze hard at the peak.","Slow return — feel the chest stretch on the way back."],watchOut:["Going too heavy and losing range of motion.","Arms going too far back on the return — stay within a comfortable stretch.","Hunching forward as the weight gets heavy."]},
    "2 Rope Overhead Extension":{setup:["Flat bottom ropes on the cable. Face away from the stack.","Step forward until there's good tension at the start.","Elbows up and pointing forward — lock them in this position before you start."],cues:["Only the forearm moves — elbows are completely fixed.","Extend fully until arms are straight.","Slow controlled return — feel the tricep stretch at the top."],watchOut:["Elbows flaring out wide (reduces tricep isolation).","Using body lean or hip drive to help.","Not achieving full lockout — the lockout is where the tricep fully contracts."]},
    "2 Rope Kneeling Tricep Pushdown":{setup:["Kneel facing the stack — kneeling removes the temptation to lean or use body weight.","Flat bottom ropes at about chest height.","Elbows tucked at your sides — they don't move."],cues:["Push straight down in a smooth arc.","Full lockout at the bottom — hold for a beat.","Controlled return — stop when forearms are parallel to floor, not higher."],watchOut:["Elbows swinging forward as the weight gets heavy.","Hunching over the movement.","Not achieving full lockout — this is the whole point of tricep work."]},
    "Pull-Ups":{setup:["Dead hang start — full shoulder extension, arms completely straight.","Grip just outside shoulder width, overhand.","Before each set: do 5 scapular pulls (depress shoulder blades without bending arms), 3 slow negatives, 5 half reps."],cues:["Initiate by pulling your shoulder blades DOWN first, then drive elbows toward your hips.","Chin clears the bar at the top.","Full dead hang at the bottom — don't bounce."],watchOut:["Kipping or swinging — every rep should be strict.","Partial range of motion — the bottom stretch is where the lat grows.","Shrugging at the bottom instead of actively hanging."]},
    "Wide Straight Bar Lat Pulldown":{setup:["Thighs locked under the pads.","Sit tall with a slight lean back — about 15 degrees, no more.","Grip wider than shoulder width. The wider the grip the more the outer lat works.","2 touch sets before your working sets: ~40% × 6 reps to wake the lats up, then ~60% × 4 reps. Focus on feeling the lat engage on both sets — not just going through the motion."],cues:["Lead with your elbows pulling down and back — not your hands.","Imagine bending the bar into a U shape.","Bring the bar to your upper chest.","Full hang at the top — let the lat stretch completely."],watchOut:["Leaning back excessively (becomes a row).","Pulling with biceps instead of initiating with the lats.","Not reaching full stretch at the top — this is where lats gain length."]},
    "Wide Straight Bar Cable Row":{setup:["Sit tall, feet on the platform, slight knee bend.","Hinge forward slightly at the hips to start — this gives the lats a stretch before each rep.","Wide grip on the straight bar."],cues:["Lead with the elbows pulling back to the lower sternum.","Chest up throughout — don't let it drop.","Brief squeeze at full contraction.","Slow return with control — hinge slightly forward again at the end."],watchOut:["Rounding the lower back — keep it neutral throughout.","Using momentum by rocking back.","Not retracting the shoulder blades at the end of the row."]},
    "Narrow Grip Lat Pulldown":{setup:["Close grip handles or narrower position on the bar.","Slightly more upright torso than the wide grip version.","The narrower grip increases range of motion."],cues:["Same initiation as wide — elbows drive down and back.","Pull to the upper chest.","Because of the longer ROM, the stretch at the top is even more pronounced — don't skip it."],watchOut:["Same as wide pulldown — don't pull with the biceps.","Leaning back to compensate for weight."]},
    "Narrow Grip Cable Row":{setup:["Close grip V-bar or rope.","Same seated position as wide row.","Hinge forward to start."],cues:["Pull to the mid-abdomen — slightly lower than the wide row.","Elbows stay close to your body throughout.","Bigger peak contraction than the wide row — hold it."],watchOut:["Elbows flaring out wide.","Losing neutral spine at the bottom.","Bouncing the weight off the stack."]},
    "2 Rope Straight Arm Pushdown":{setup:["Flat bottom ropes at the top of the stack.","Stand back a step so there's tension at the start position with arms raised.","Arms almost straight — a very slight soft elbow only."],cues:["Keep arms straight throughout the entire movement — this is what makes it a lat isolation.","Push down in a long wide arc.","Feel the lat stretch hard at the top.","Squeeze the lats at the bottom."],watchOut:["Bending the elbows turns this into a pulldown — keep arms locked.","Standing too close to the stack (loses the arc).","Not getting a full stretch — the stretch is the whole point."]},
    "Recline DB Curl":{setup:["Incline bench at 45–60 degrees.","Sit back fully, arms hanging straight down — this puts the bicep in a stretched position from the start.","Supinated grip (palms forward)."],cues:["The stretch at the bottom is the entire reason you're on an incline — don't shortcut it.","Curl slowly and with control.","Squeeze hard at the top.","Don't let the elbows swing forward as you curl."],watchOut:["Rushing through the bottom position — spend time in the stretch.","Going too heavy and losing the stretched starting position.","Elbows drifting forward (reduces the stretch advantage of the incline)."]},
    "Recline Hammer Curl":{setup:["Same incline bench position as the DB curl.","Neutral grip — thumbs pointing up.","This targets the brachialis (underneath the bicep) and brachioradialis."],cues:["Same cues as the DB curl — maximise the bottom stretch.","Keep the wrist neutral throughout — don't rotate.","Slow and controlled all the way through."],watchOut:["Rotating the wrist during the movement — keep it neutral.","Using momentum at the bottom.","Going too heavy and losing position."]},
    "Preacher Curl Machine":{setup:["Adjust seat height so armpits rest comfortably on the top of the pad.","Arms should reach full extension at the bottom — adjust if not.","Grip at shoulder width."],cues:["Full extension at the bottom — don't stop short.","Curl through the full range.","Squeeze and hold at the top for a beat.","2–3 second controlled return to full extension."],watchOut:["Cutting the range short at the bottom — full extension is what makes the preacher curl effective.","Using the shoulders to initiate the lift.","Going too heavy — this exercise only works properly with controlled weight."]},
    "Stiff-Legged Deadlift":{setup:["Shoulder-width stance, toes forward or very slightly out.","Slight bend in the knees — soft, not squatted.","Bar or cable close to your body throughout."],cues:["Hinge at the hip — push your hips back, not down.","Keep your back flat and chest proud throughout.","Feel the hamstring stretch as you lower — that's the cue to stop.","Drive your hips forward to stand, squeezing the glutes at the top."],watchOut:["Rounding the lower back — this is the main injury risk. Stop if you feel the back rounding.","Bending the knees too much (becomes a regular deadlift and loses hamstring focus).","Bar or cable drifting away from the body."]},
    "Hack Squat":{setup:["Feet shoulder-width on the platform, toes slightly out.","Shoulders and back fully against the pads.","Before loading up: ramp sets are mandatory here — see warmup protocol."],cues:["Control the descent — don't let it drop.","Knees track over your toes throughout.","Hit full depth if your mobility allows.","Drive through your heels and mid-foot to stand."],watchOut:["⚠️ Vasovagal risk — walk between every working set, don't sit. See the legs protocol.","Knees caving inward — push them out.","Heels lifting off the platform.","Locking out aggressively at the top — keep tension on the quads."]},
    "Leg Press / Belt Squat":{setup:["Feet mid-platform at shoulder width, toes slightly out.","Full back contact with the pad throughout.","⚠️ Keep 2+ RIR on this exercise — you're already deep into the session.","2 touch sets before working sets: ~40% × 6 reps, then ~60% × 4 reps. Your legs are already warm from the Hack Squat so these are brief — just enough to adjust to the different movement pattern and load path."],cues:["Control the negative — don't let the weight drop.","Knees track over toes.","Drive through the mid-foot.","Don't lock out fully at the top — keep tension on the quads."],watchOut:["⚠️ Do not go to absolute failure here — vasovagal risk on a third compound.","Bum lifting off the seat at the bottom (lower back injury risk).","Feet too low on the platform (increases knee stress)."]},
    "Hip Thrust":{setup:["Upper back on the bench, not your neck.","Bar or weight across the hip crease — use a pad.","Feet hip-width, toes slightly out, about shin-vertical distance from your hips."],cues:["Drive through your heels.","Squeeze your glutes hard at the top — full hip extension.","Keep your chin tucked — don't hyperextend the neck.","Hold at the top for a beat before lowering."],watchOut:["Hyperextending the lower back at the top — the squeeze comes from the glutes, not the spine.","Feet too far out or in — experiment with position.","Losing upper back contact with the bench during the movement."]},
    "Leg Extension (single leg)":{setup:["Sit fully back in the seat.","Pad just above the ankle.","Single leg — this allows heavier loading per leg and removes compensation."],cues:["Extend fully — don't stop short.","Pause and squeeze the quad hard at the top.","3 second eccentric — slow all the way down.","Full extension every rep."],watchOut:["Bum lifting off the seat during extension — keep hips down.","Swinging the weight up — controlled throughout.","Stopping short of full extension."]},
    "Hamstring Curl (single leg)":{setup:["Lie face down, pad just above the ankle.","Hip bones pressing into the pad — don't let them lift.","Single leg — same rationale as single leg extension."],cues:["Curl the heel toward your glute.","Squeeze the hamstring hard at the peak.","Slow return to full extension — the negative is where the growth happens."],watchOut:["Hips lifting off the pad (cheating the movement and reducing hamstring tension).","Not reaching full extension on the return.","Using momentum to swing the weight up."]},
    "Abductor / Adductor Machine":{setup:["Sit upright with back against the pad.","Pads positioned just above the knees.","This is a flush set late in the session — keep the weight manageable."],cues:["Controlled movement in both directions.","Don't slam the weight at the end of the range.","Feel the stretch on the way back."],watchOut:["Using momentum — slow and controlled is the point.","Going too heavy — this is isolation work, not a strength exercise.","Not controlling the eccentric — the return is as important as the push."]},
    "Calf Raise":{setup:["Balls of the feet on the edge of the platform — heels hanging off.","Stand tall, slight bend in the knee."],cues:["Rise as high as possible — full plantar flexion.","Pause at the top.","3 SECOND ECCENTRIC on the way down — this is non-negotiable.","Full stretch at the bottom — heels drop below the platform."],watchOut:["Bouncing at the bottom — the stretch position must be controlled.","Rushing the descent — the 3-second eccentric is what makes calves grow.","Partial range of motion — calves need full ROM to respond."]},
  };

  // ─── ExCard ───────────────────────────────────────────────────────────────────
  function ExCard({ex,isCompound,phase,phaseColor,dayColor,loggedSets,isLogging,logState,prevSets,onStartLog,onChange,onSubmit,onCancel,onInfo}) {
    const tgt=targetSets(ex,phase),label=targetLabel(ex,phase);
    const done=loggedSets.length>=tgt,prog=done?checkProgression(ex,phase,loggedSets):null;
    return(
      <div style={{background:done?"#141418":isCompound?C.CARD:C.CARD2,borderRadius:14,marginBottom:10,overflow:"hidden",border:`1px solid ${done?"#333340":isCompound?C.BORDER:"#22222F"}`}}>
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1,marginRight:12}}>
              <div style={{fontWeight:isCompound?700:600,fontSize:isCompound?15:14,lineHeight:1.3,color:done?"#C0C4D8":C.TEXT}}>{done?"✓ ":""}{ex.name}</div>
              <button onClick={onInfo} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,color:C.MUTED,fontWeight:600,padding:"4px 0 0",fontFamily:"inherit",letterSpacing:"0.04em",display:"block"}}>ⓘ Details</button>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:isCompound?18:15,fontWeight:800,color:done?"#888":isCompound?"#C0C4D8":C.MUTED}}>{label}</div>
              {!ex.special&&!ex.iso&&isCompound&&<div style={{fontSize:11,color:C.MUTED,marginTop:2}}>{PHASES[phase].rir}</div>}
            </div>
          </div>
          {prevSets?.length>0&&(
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginTop:10}}>
              <div style={{fontSize:10,color:"#44475A",fontWeight:700,letterSpacing:"0.1em",flexShrink:0}}>LAST</div>
              {prevSets.map((s,i)=><div key={i} style={{fontSize:11,color:"#44475A"}}>{s.weight>0?`${s.weight}kg×${s.reps}`:`BW×${s.reps}`}{i<prevSets.length-1?" ·":""}</div>)}
            </div>
          )}
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:prevSets?.length>0?8:12}}>
            {loggedSets.map((s,i)=><div key={i} style={{background:done?"#1E1E26":"#13131C",border:`1px solid ${done?"#333340":C.BORDER}`,borderRadius:8,padding:"5px 11px",fontSize:13,fontWeight:700,color:done?"#C0C4D8":"#B0B4C8"}}>{s.weight>0?`${s.weight}kg × ${s.reps}`:`BW × ${s.reps}`}</div>)}
            {!done&&Array.from({length:tgt-loggedSets.length}).map((_,i)=><div key={i} style={{border:`1px dashed ${C.BORDER}`,borderRadius:8,padding:"5px 11px",fontSize:13,color:C.MUTED}}>Set {loggedSets.length+i+1}</div>)}
          </div>
        </div>
        {prog!==null&&(
          <div style={{padding:"11px 16px",borderTop:`1px solid ${prog?"#2E2E3E":"#222"}`,background:prog?"#111116":"#111",display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:18,lineHeight:1,color:prog?"#D0D4E8":"#555"}}>{prog?"↑":"○"}</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:prog?"#D0D4E8":"#555"}}>{prog?"Add weight next session":"Keep building at this weight"}</div>
              <div style={{fontSize:11,color:prog?"#6B6F82":"#3A3A3A",marginTop:1}}>{prog?"+5kg machines · +1 pin cables":`Hit ${getTopReps(ex[`p${phase}`].reps)} reps across all ${tgt} sets first`}</div>
            </div>
          </div>
        )}
        {isLogging&&(
          <div style={{padding:"14px 16px",borderTop:`1px solid ${C.BORDER}`,background:"#111118"}}>
            <div style={{fontSize:12,color:C.MUTED,fontWeight:700,letterSpacing:"0.06em",marginBottom:14}}>SET {loggedSets.length+1} OF {tgt}</div>
            <div style={{display:"flex",gap:12,marginBottom:14}}>
              {[{lbl:"WEIGHT (kg)",field:"weight",mode:"decimal"},{lbl:"REPS",field:"reps",mode:"numeric"}].map(({lbl,field,mode})=>(
                <div key={field} style={{flex:1}}>
                  <div style={{fontSize:10,color:C.MUTED,marginBottom:6,letterSpacing:"0.1em"}}>{lbl}</div>
                  <input type="number" inputMode={mode} value={logState[field]} onChange={e=>onChange(field,e.target.value)} placeholder="0" style={{width:"100%",padding:"13px 14px",borderRadius:12,background:C.CARD,border:"1.5px solid #3A3A4A",color:C.TEXT,fontSize:24,fontWeight:800,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={onSubmit} style={btn("#F0F0F4","#0E0E15",{flex:1,padding:"14px",fontSize:15,borderRadius:12})}>✓ Log Set</button>
              <button onClick={onCancel} style={btn(C.CARD,C.MUTED,{padding:"14px 18px",fontSize:15,border:`1px solid ${C.BORDER}`,borderRadius:12})}>✕</button>
            </div>
          </div>
        )}
        {!isLogging&&!done&&(
          <div style={{padding:"0 16px 14px"}}>
            <button onClick={onStartLog} style={btn("transparent",C.MUTED,{width:"100%",padding:"11px",fontSize:14,border:"1px solid #3A3A4A",borderRadius:12})}>+ Log Set {loggedSets.length+1} of {tgt}</button>
          </div>
        )}
      </div>
    );
  }

  // ─── App ──────────────────────────────────────────────────────────────────────
  function App() {
    const [ready,setReady]=useState(false);
    // shared
    const [view,setView]=useState("main");
    // PPL
    const [phase,setPhase]=useState(1);
    const [phaseStartedAt,setPhaseStartedAt]=useState(Date.now());
    const [sessions,setSessions]=useState([]);
    const [pplDay,setPplDay]=useState(null);
    const [workout,setWorkout]=useState({});
    const [logging,setLogging]=useState(null);
    const [timer,setTimer]=useState({on:false,secs:0,max:0});
    const [histOpen,setHistOpen]=useState(null);
    const [showExitModal,setShowExitModal]=useState(false);
    const [selectedExInfo,setSelectedExInfo]=useState(null);
    const [returnView,setReturnView]=useState("home");
    // Cardio
    const [cardioSessions,setCardioSessions]=useState([]);
    const [cardioMachine,setCardioMachine]=useState(null);
    const [cardioBlocks,setCardioBlocks]=useState([]);
    const [cardioLogging,setCardioLogging]=useState(false);
    const [cardioLogState,setCardioLogState]=useState({});
    const [cardioHistOpen,setCardioHistOpen]=useState(null);
    const [showCardioExitModal,setShowCardioExitModal]=useState(false);
    const tickRef=useRef(null);

    useEffect(()=>{
      const s=loadStore();
      setPhase(s.phase||1); setSessions(s.sessions||[]); setPhaseStartedAt(s.phaseStartedAt||Date.now()); setCardioSessions(s.cardioSessions||[]); setReady(true);
    },[]);

    const persist=(updates)=>{
      const cur=loadStore();
      saveStore({...cur,...updates});
    };

    // Timer
    useEffect(()=>{
      if(timer.on&&timer.secs>0) tickRef.current=setTimeout(()=>setTimer(t=>({...t,secs:t.secs-1})),1000);
      else if(timer.on&&timer.secs===0) setTimer(t=>({...t,on:false}));
      return ()=>clearTimeout(tickRef.current);
    },[timer.on,timer.secs]);
    const skipTimer=()=>{ clearTimeout(tickRef.current); setTimer({on:false,secs:0,max:0}); };
    const startTimer=(isComp)=>{ const max=isComp?PHASES[phase].restComp:PHASES[phase].restIso; setTimer({on:true,secs:max,max}); };

    // PPL handlers
    const updatePhase=(p)=>{ const now=Date.now(); setPhase(p); setPhaseStartedAt(now); persist({phase:p,phaseStartedAt:now}); };
    const restartProgram=()=>{ const now=Date.now(); setPhase(1); setPhaseStartedAt(now); persist({phase:1,phaseStartedAt:now}); };
    const startPplWorkout=(d)=>{ setPplDay(d); setWorkout({}); setLogging(null); setShowExitModal(false); skipTimer(); setView("workout"); };
    const openLogger=(ex,isComp)=>{ const prev=getLastSets(sessions,pplDay,ex.name); const lw=prev?.[0]?.weight; setLogging({exName:ex.name,isCompound:isComp,weight:lw?String(lw):"",reps:""}); };
    const submitSet=()=>{ if(!logging) return; const {exName,isCompound,weight,reps}=logging; setWorkout(prev=>({...prev,[exName]:[...(prev[exName]||[]),{weight:parseFloat(weight)||0,reps:parseInt(reps)||0}]})); setLogging(null); startTimer(isCompound); };
    const finishPplWorkout=()=>{ const sess={id:`${todayStr()}-${pplDay}-${Date.now()}`,date:todayStr(),day:pplDay,phase,exercises:workout,ts:Date.now()}; const updated=[...sessions,sess]; setSessions(updated); persist({sessions:updated}); skipTimer(); setShowExitModal(false); setView("home"); };

    // Cardio handlers
    const startCardio=(machine)=>{ setCardioMachine(machine); setCardioBlocks([]); setCardioLogging(false); setCardioLogState({}); setShowCardioExitModal(false); setView("cardio-session"); };
    const openCardioLogger=()=>{ const fields={}; CARDIO[cardioMachine].fields.forEach(f=>{ fields[f.key]=""; }); setCardioLogState(fields); setCardioLogging(true); };
    const submitCardioBlock=()=>{ const block={...cardioLogState}; Object.keys(block).forEach(k=>{ block[k]=parseFloat(block[k])||0; }); setCardioBlocks(prev=>[...prev,block]); setCardioLogging(false); setCardioLogState({}); };
    const finishCardio=()=>{ const sess={id:`${todayStr()}-${cardioMachine}-${Date.now()}`,date:todayStr(),machine:cardioMachine,blocks:cardioBlocks,ts:Date.now()}; const updated=[...cardioSessions,sess]; setCardioSessions(updated); persist({cardioSessions:updated}); setShowCardioExitModal(false); setView("cardio-home"); };

    if(!ready) return <div style={{background:C.BG,minHeight:"100svh",display:"flex",alignItems:"center",justifyContent:"center",color:C.MUTED,fontSize:14}}>Loading…</div>;

    const pd=PHASES[phase];

    // ── EXERCISE INFO ──────────────────────────────────────────────────────────
    if(view==="exercise-info"&&selectedExInfo){
      const info=EXERCISE_INFO[selectedExInfo];
      const allEx=Object.values(WORKOUTS).flatMap(w=>[...w.compounds,...w.isolations]);
      const exObj=allEx.find(e=>e.name===selectedExInfo);
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px 32px`,overflowY:"auto"}}>
          <div style={{fontSize:11,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Exercise Guide</div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:"-0.02em",lineHeight:1.2,marginBottom:20}}>{selectedExInfo}</div>
          {exObj?.warmup&&<div style={{background:C.CARD,borderRadius:14,padding:"14px 18px",border:`1px solid ${C.BORDER}`,marginBottom:12}}><div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>🔥 Warmup</div><div style={{fontSize:14,color:"#D0D0D8",lineHeight:1.5}}>{exObj.warmup}</div></div>}
          {exObj?.note&&<div style={{background:C.CARD,borderRadius:14,padding:"14px 18px",border:`1px solid ${C.BORDER}`,marginBottom:12}}><div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>📌 Note</div><div style={{fontSize:14,color:"#D0D0D8",lineHeight:1.5}}>{exObj.note}</div></div>}
          {info?(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[{title:"Setup",icon:"⚙️",items:info.setup},{title:"Cues",icon:"✓",items:info.cues},{title:"Watch Out",icon:"⚠️",items:info.watchOut}].filter(s=>s.items?.length).map(section=>(
                <div key={section.title} style={{background:C.CARD,borderRadius:14,padding:"16px 18px",border:`1px solid ${C.BORDER}`}}>
                  <div style={{fontSize:10,letterSpacing:"0.14em",color:C.MUTED,textTransform:"uppercase",fontWeight:700,marginBottom:12}}>{section.icon} {section.title}</div>
                  {section.items.map((item,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:i<section.items.length-1?10:0}}><div style={{color:C.MUTED,fontSize:12,flexShrink:0,marginTop:2}}>—</div><div style={{fontSize:14,color:"#D0D0D8",lineHeight:1.5}}>{item}</div></div>)}
                </div>
              ))}
            </div>
          ):<div style={{color:C.MUTED,fontSize:14}}>No additional details available.</div>}
          <button onClick={()=>setView(returnView)} style={btn("#F0F0F4","#0E0E15",{width:"100%",padding:"17px",fontSize:16,borderRadius:14,marginTop:24})}>Return to Workout</button>
        </div>
      );
    }

    // ── MAIN LANDING ───────────────────────────────────────────────────────────
    if(view==="main"){
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`,display:"flex",flexDirection:"column"}}>
          <div style={{fontSize:10,letterSpacing:"0.16em",color:C.MUTED,textTransform:"uppercase",marginBottom:4}}>Workout Tracker</div>
          <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.025em",marginBottom:6}}>What are you training today?</div>
          <div style={{fontSize:13,color:C.MUTED,marginBottom:36}}>Select a workout type to get started.</div>
          <div style={{display:"flex",flexDirection:"column",gap:14,flex:1}}>
            {/* PPL Card */}
            <button onClick={()=>setView("home")} style={{background:C.CARD,border:`1px solid ${C.BORDER}`,borderRadius:20,padding:"24px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",display:"block",width:"100%"}}>
              <div style={{fontSize:32,marginBottom:12}}>💪</div>
              <div style={{fontWeight:800,fontSize:22,color:C.TEXT,marginBottom:4}}>Push / Pull / Legs</div>
              <div style={{fontSize:13,color:C.MUTED,lineHeight:1.5,marginBottom:16}}>Structured strength program · 3 progressive phases · Full exercise library with guides</div>
              <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#818CF822",borderRadius:10,padding:"8px 14px"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#818CF8"}}>Open Program →</div>
              </div>
            </button>
            {/* Cardio Card */}
            <button onClick={()=>setView("cardio-home")} style={{background:C.CARD,border:`1px solid ${C.BORDER}`,borderRadius:20,padding:"24px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",display:"block",width:"100%"}}>
              <div style={{fontSize:32,marginBottom:12}}>🏃</div>
              <div style={{fontWeight:800,fontSize:22,color:C.TEXT,marginBottom:4}}>Cardio</div>
              <div style={{fontSize:13,color:C.MUTED,lineHeight:1.5,marginBottom:16}}>Treadmill · Elliptical · Bike · Log blocks, track duration and intensity, monitor improvement</div>
              <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#06B6D422",borderRadius:10,padding:"8px 14px"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#06B6D4"}}>Open Cardio →</div>
              </div>
            </button>
          </div>
        </div>
      );
    }

    // ── CARDIO HOME ────────────────────────────────────────────────────────────
    if(view==="cardio-home"){
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
          <button onClick={()=>setView("main")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>← Back</button>
          <div style={{fontSize:10,letterSpacing:"0.16em",color:C.MUTED,textTransform:"uppercase",marginBottom:4}}>Cardio</div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:"-0.025em",marginBottom:24}}>Choose Machine</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
            {Object.entries(CARDIO).map(([key,m])=>{
              const last=lastCardioSession(cardioSessions,key);
              const lastTotal=last?totalDuration(last.blocks):null;
              return(
                <div key={key} style={{background:C.CARD,borderRadius:16,padding:"18px",border:`1px solid ${C.BORDER}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:m.color}}/>
                      <div style={{fontWeight:800,fontSize:18}}>{m.label}</div>
                    </div>
                    <div style={{fontSize:12,color:C.MUTED}}>{m.fields.map(f=>f.label).join(" · ")}</div>
                    {last&&<div style={{fontSize:11,color:C.MUTED,marginTop:2}}>Last: {fmtDate(last.date)} · {lastTotal} min</div>}
                  </div>
                  <button onClick={()=>startCardio(key)} style={btn(m.color,"#0E0E15",{padding:"11px 20px",fontSize:14,borderRadius:12,flexShrink:0,marginLeft:12})}>Start →</button>
                </div>
              );
            })}
          </div>
          {cardioSessions.length>0&&(
            <button onClick={()=>setView("cardio-history")} style={btn("transparent",C.MUTED,{width:"100%",padding:"14px",fontSize:13,border:`1px solid ${C.BORDER}`,borderRadius:14})}>
              View Cardio History ({cardioSessions.length} sessions)
            </button>
          )}
        </div>
      );
    }

    // ── CARDIO HISTORY ─────────────────────────────────────────────────────────
    if(view==="cardio-history"){
      const sorted=[...cardioSessions].sort((a,b)=>b.ts-a.ts);
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
          <button onClick={()=>setView("cardio-home")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>← Back</button>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.02em",marginBottom:20}}>Cardio History</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sorted.map(s=>{
              const m=CARDIO[s.machine], open=cardioHistOpen===s.id, total=totalDuration(s.blocks);
              return(
                <div key={s.id} style={{background:C.CARD,borderRadius:16,border:`1px solid ${C.BORDER}`,overflow:"hidden"}}>
                  <div onClick={()=>setCardioHistOpen(open?null:s.id)} style={{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:m.color}}/>
                        <div style={{fontWeight:700,fontSize:15}}>{m.label}</div>
                      </div>
                      <div style={{fontSize:12,color:C.MUTED}}>{fmtDate(s.date)} · {s.blocks.length} block{s.blocks.length!==1?"s":""} · {total} min total</div>
                    </div>
                    <div style={{color:C.MUTED,fontSize:16,marginLeft:12}}>{open?"▲":"▼"}</div>
                  </div>
                  {open&&(
                    <div style={{padding:"0 18px 16px",borderTop:`1px solid ${C.BORDER}`}}>
                      {s.blocks.map((block,i)=>(
                        <div key={i} style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>
                          <div style={{fontSize:11,color:C.MUTED,width:"100%",marginBottom:2}}>Block {i+1}</div>
                          {CARDIO[s.machine].fields.map(f=>(
                            <div key={f.key} style={{background:C.CARD2,border:`1px solid ${C.BORDER}`,borderRadius:8,padding:"4px 10px",fontSize:12,color:C.MUTED,fontWeight:600}}>
                              {block[f.key]} {f.unit}
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── CARDIO SESSION ─────────────────────────────────────────────────────────
    if(view==="cardio-session"&&cardioMachine){
      const m=CARDIO[cardioMachine], dc=m.color;
      const prevSession=lastCardioSession(cardioSessions,cardioMachine);
      const prevTotal=prevSession?totalDuration(prevSession.blocks):null;
      const currentTotal=totalDuration(cardioBlocks);
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",paddingBottom:SAB}}>
          {/* Header */}
          <div style={{position:"sticky",top:0,zIndex:10,background:C.BG,borderBottom:`1px solid ${C.BORDER}`,padding:`${PAD} 20px 14px`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>setShowCardioExitModal(true)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.MUTED,fontSize:24,padding:"4px 8px 4px 0",lineHeight:1,fontFamily:"inherit"}}>←</button>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:dc}}/>
                    <div style={{fontWeight:800,fontSize:18}}>{m.label}</div>
                  </div>
                  <div style={{fontSize:11,color:C.MUTED,marginTop:2}}>{cardioBlocks.length} block{cardioBlocks.length!==1?"s":""} · {currentTotal} min logged</div>
                </div>
              </div>
              <button onClick={()=>setShowCardioExitModal(true)} style={btn("#F0F0F4","#0E0E15",{padding:"10px 18px",fontSize:14,borderRadius:12})}>Finish ✓</button>
            </div>
          </div>

          <div style={{padding:"18px 20px"}}>
            {/* Previous session reference */}
            {prevSession&&(
              <div style={{background:C.CARD,borderRadius:14,padding:"13px 16px",marginBottom:16,border:`1px solid ${C.BORDER}`}}>
                <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>Last Session — {fmtDate(prevSession.date)} · {prevTotal} min</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {prevSession.blocks.map((block,i)=>(
                    <div key={i} style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <div style={{fontSize:11,color:"#44475A",flexShrink:0,minWidth:48}}>Block {i+1}</div>
                      {m.fields.map(f=><div key={f.key} style={{fontSize:11,color:"#44475A"}}>{block[f.key]}{f.unit}{f!==m.fields[m.fields.length-1]?" ·":""}</div>)}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Logged blocks */}
            {cardioBlocks.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
                {cardioBlocks.map((block,i)=>(
                  <div key={i} style={{background:C.CARD,borderRadius:14,padding:"13px 16px",border:`1px solid ${C.BORDER}`}}>
                    <div style={{fontSize:11,color:C.MUTED,fontWeight:700,marginBottom:8}}>Block {i+1}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {m.fields.map(f=>(
                        <div key={f.key} style={{background:"#13131C",borderRadius:8,padding:"5px 11px",border:`1px solid ${C.BORDER}`}}>
                          <div style={{fontSize:10,color:C.MUTED,marginBottom:2}}>{f.label}</div>
                          <div style={{fontSize:15,fontWeight:800,color:"#C0C4D8"}}>{block[f.key]} <span style={{fontSize:11,fontWeight:400,color:C.MUTED}}>{f.unit}</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Logger form */}
            {cardioLogging?(
              <div style={{background:C.CARD,borderRadius:14,padding:"16px",border:`1px solid ${C.BORDER}`,marginBottom:12}}>
                <div style={{fontSize:11,color:C.MUTED,fontWeight:700,letterSpacing:"0.06em",marginBottom:14}}>BLOCK {cardioBlocks.length+1}</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
                  {m.fields.map(f=>(
                    <div key={f.key} style={{flex:1,minWidth:80}}>
                      <div style={{fontSize:10,color:C.MUTED,marginBottom:6,letterSpacing:"0.1em"}}>{f.label.toUpperCase()} ({f.unit})</div>
                      <input type="number" inputMode={f.mode} value={cardioLogState[f.key]||""} onChange={e=>setCardioLogState(s=>({...s,[f.key]:e.target.value}))} placeholder="0"
                        style={{width:"100%",padding:"11px 12px",borderRadius:12,background:C.CARD2,border:"1.5px solid #3A3A4A",color:C.TEXT,fontSize:22,fontWeight:800,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={submitCardioBlock} style={btn("#F0F0F4","#0E0E15",{flex:1,padding:"13px",fontSize:15,borderRadius:12})}>✓ Log Block</button>
                  <button onClick={()=>setCardioLogging(false)} style={btn(C.CARD2,C.MUTED,{padding:"13px 16px",fontSize:15,border:`1px solid ${C.BORDER}`,borderRadius:12})}>✕</button>
                </div>
              </div>
            ):(
              <button onClick={openCardioLogger} style={btn("transparent",C.MUTED,{width:"100%",padding:"14px",fontSize:14,border:"1px solid #3A3A4A",borderRadius:14})}>
                + Log Block {cardioBlocks.length+1}
              </button>
            )}
          </div>

          {/* Exit modal */}
          {showCardioExitModal&&(
            <div onClick={()=>setShowCardioExitModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:`0 16px ${SAB}`}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"#1C1C27",borderRadius:22,padding:"26px 22px",width:"100%",maxWidth:440,border:`1px solid ${C.BORDER}`}}>
                <div style={{fontWeight:800,fontSize:20,color:C.TEXT,marginBottom:8}}>Finish session?</div>
                <div style={{fontSize:13,color:C.MUTED,marginBottom:26,lineHeight:1.5}}>{cardioBlocks.length} block{cardioBlocks.length!==1?"s":""} logged · {currentTotal} min total</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <button onClick={finishCardio} style={btn("#F0F0F4","#0E0E15",{width:"100%",padding:"16px",fontSize:16,borderRadius:14})}>Save &amp; Exit</button>
                  <button onClick={()=>{setShowCardioExitModal(false);setView("cardio-home");}} style={btn("#2A1A1A","#E07070",{width:"100%",padding:"16px",fontSize:16,borderRadius:14,border:"1px solid #4A2A2A"})}>Discard Session</button>
                  <button onClick={()=>setShowCardioExitModal(false)} style={btn("transparent",C.MUTED,{width:"100%",padding:"14px",fontSize:15,borderRadius:14})}>Cancel</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── PPL HOME ───────────────────────────────────────────────────────────────
    if(view==="home"){
      const lastOf=(d)=>[...sessions].filter(s=>s.day===d).sort((a,b)=>b.date.localeCompare(a.date))[0];
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
          <button onClick={()=>setView("main")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>← Back</button>
          <div style={{fontSize:10,letterSpacing:"0.16em",color:C.MUTED,textTransform:"uppercase",marginBottom:4}}>Strength</div>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.025em",marginBottom:24}}>Push / Pull / Legs</div>
          <div style={{fontSize:10,letterSpacing:"0.14em",color:C.MUTED,textTransform:"uppercase",fontWeight:600,marginBottom:8}}>Training Phase</div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            {[1,2,3].map(p=>(
              <button key={p} onClick={()=>updatePhase(p)} style={btn(phase===p?`${PHASES[p].color}1A`:C.CARD,phase===p?PHASES[p].color:C.MUTED,{flex:1,padding:"11px 4px",border:`1.5px solid ${phase===p?PHASES[p].color:C.BORDER}`,borderRadius:12,fontSize:13})}>
                <div>Phase {p}</div><div style={{fontSize:10,marginTop:2,opacity:0.75}}>{PHASES[p].weeks}</div>
              </button>
            ))}
          </div>
          <div style={{background:C.CARD,borderRadius:14,padding:"12px 0",display:"flex",marginBottom:24}}>
            {[{l:"Compounds",v:`${pd.compSets} × ${pd.compReps}`},{l:"Target",v:pd.rir},{l:"Rest",v:`${pd.restComp/60}m`},{l:"Isolations",v:`3 × ${pd.isoReps}`}].map((x,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",borderRight:i<3?`1px solid ${C.BORDER}`:"none"}}>
                <div style={{color:pd.color,fontWeight:700,fontSize:13}}>{x.v}</div>
                <div style={{color:C.MUTED,fontSize:10,marginTop:2}}>{x.l}</div>
              </div>
            ))}
          </div>
          {/* Phase progression */}
          {(()=>{
            const target=CYCLE_TARGETS[phase],cycles=countCycles(sessions,phase,phaseStartedAt);
            const complete=cycles>=target,programDone=phase===3&&complete,pct=Math.min((cycles/target)*100,100);
            return(
              <div style={{background:C.CARD,borderRadius:14,padding:"16px 18px",marginBottom:24,border:`1px solid ${C.BORDER}`}}>
                <div style={{fontSize:10,letterSpacing:"0.14em",color:C.MUTED,textTransform:"uppercase",fontWeight:600,marginBottom:12}}>Phase Progress</div>
                {programDone?(
                  <div>
                    <div style={{fontSize:17,fontWeight:800,color:"#FFD700",marginBottom:6}}>🏆 Program Complete!</div>
                    <div style={{fontSize:13,color:C.MUTED,lineHeight:1.5,marginBottom:16}}>You've finished all 3 phases. Take a deload week, then restart when ready.</div>
                    <button onClick={restartProgram} style={btn(C.CARD2,C.MUTED,{width:"100%",padding:"12px",fontSize:13,border:`1px solid ${C.BORDER}`,borderRadius:12})}>Restart at Phase 1</button>
                  </div>
                ):complete?(
                  <div>
                    <div style={{fontSize:17,fontWeight:800,color:"#5ABF5A",marginBottom:6}}>↑ Ready for Phase {phase+1}</div>
                    <div style={{fontSize:13,color:C.MUTED,lineHeight:1.5,marginBottom:16}}>You've completed {cycles} full cycles at Phase {phase}. Time to step it up.</div>
                    <button onClick={()=>updatePhase(phase+1)} style={btn(pd.color,"#0E0E15",{width:"100%",padding:"13px",fontSize:14,borderRadius:12})}>Move to Phase {phase+1} →</button>
                  </div>
                ):(
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.TEXT}}>Phase {phase} → {phase<3?`Phase ${phase+1}`:"Complete"}</div>
                      <div style={{fontSize:14,fontWeight:800,color:pd.color}}>{cycles}/{target} cycles</div>
                    </div>
                    <div style={{height:6,background:"#22222F",borderRadius:3,overflow:"hidden",marginBottom:10}}>
                      <div style={{height:"100%",width:`${pct}%`,background:pd.color,borderRadius:3,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:12,color:C.MUTED}}>{target-cycles} more full cycle{target-cycles!==1?"s":""} (Push + Pull + Legs) to go</div>
                  </div>
                )}
              </div>
            );
          })()}
          <div style={{fontSize:10,letterSpacing:"0.14em",color:C.MUTED,textTransform:"uppercase",fontWeight:600,marginBottom:10}}>Start Workout</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
            {["push","pull","legs"].map(d=>{
              const w=WORKOUTS[d],last=lastOf(d),ready=countReady(sessions,d,phase),total=w.compounds.length+w.isolations.length;
              return(
                <div key={d} style={{background:C.CARD,borderRadius:16,padding:"18px",border:`1px solid ${C.BORDER}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:w.color}}/>
                      <div style={{fontWeight:800,fontSize:19,letterSpacing:"0.01em"}}>{w.label.toUpperCase()}</div>
                    </div>
                    <div style={{fontSize:12,color:C.MUTED}}>{total} exercises · {w.compounds.length} compounds</div>
                    {last&&<div style={{fontSize:11,color:C.MUTED,marginTop:2}}>Last: {fmtDate(last.date)}</div>}
                    {ready&&<div style={{fontSize:11,fontWeight:700,marginTop:4,color:ready.ready>0?"#5ABF5A":C.MUTED}}>{ready.ready>0?`↑ ${ready.ready}/${ready.total} compounds ready to progress`:`${ready.total} compounds — keep building`}</div>}
                  </div>
                  <button onClick={()=>startPplWorkout(d)} style={btn(w.color,"#0E0E15",{padding:"11px 20px",fontSize:14,borderRadius:12,flexShrink:0,marginLeft:12})}>Start →</button>
                </div>
              );
            })}
          </div>
          {sessions.length>0&&<button onClick={()=>setView("history")} style={btn("transparent",C.MUTED,{width:"100%",padding:"14px",fontSize:13,border:`1px solid ${C.BORDER}`,borderRadius:14})}>View History ({sessions.length} sessions)</button>}
        </div>
      );
    }

    // ── PPL HISTORY ────────────────────────────────────────────────────────────
    if(view==="history"){
      const sorted=[...sessions].sort((a,b)=>b.ts-a.ts);
      return(
        <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
          <button onClick={()=>setView("home")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 20px"})}>← Back</button>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.02em",marginBottom:20}}>PPL History</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sorted.map(s=>{
              const w=WORKOUTS[s.day],setCount=Object.values(s.exercises).reduce((a,sets)=>a+(sets?.length||0),0);
              const exCount=Object.keys(s.exercises).filter(k=>s.exercises[k]?.length>0).length,open=histOpen===s.id;
              const comps=WORKOUTS[s.day].compounds.filter(ex=>!ex.special&&!ex.iso&&ex[`p${s.phase}`]);
              const readyCount=comps.filter(ex=>{ const sets=s.exercises?.[ex.name]; return sets?.length&&checkProgression(ex,s.phase,sets)===true; }).length;
              return(
                <div key={s.id} style={{background:C.CARD,borderRadius:16,border:`1px solid ${C.BORDER}`,overflow:"hidden"}}>
                  <div onClick={()=>setHistOpen(open?null:s.id)} style={{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:w.color}}/>
                        <div style={{fontWeight:700,fontSize:15}}>{w.label} · Phase {s.phase}</div>
                      </div>
                      <div style={{fontSize:12,color:C.MUTED}}>{fmtDate(s.date)} · {exCount} exercises · {setCount} sets</div>
                      {readyCount>0&&<div style={{fontSize:11,color:"#4ABF4A",marginTop:2,fontWeight:600}}>↑ {readyCount} compound{readyCount>1?"s":""} ready to progress</div>}
                    </div>
                    <div style={{color:C.MUTED,fontSize:16,marginLeft:12}}>{open?"▲":"▼"}</div>
                  </div>
                  {open&&(
                    <div style={{padding:"0 18px 16px",borderTop:`1px solid ${C.BORDER}`}}>
                      {Object.entries(s.exercises).filter(([,sets])=>sets?.length>0).map(([name,sets])=>{
                        const ex=[...WORKOUTS[s.day].compounds,...WORKOUTS[s.day].isolations].find(e=>e.name===name);
                        const progReady=ex?checkProgression(ex,s.phase,sets):null;
                        return(
                          <div key={name} style={{marginTop:14}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                              <div style={{fontSize:13,fontWeight:700,color:"#C8C8D4"}}>{name}</div>
                              {progReady===true&&<div style={{fontSize:10,color:"#4ABF4A",fontWeight:700}}>↑ PROGRESS</div>}
                            </div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                              {sets.map((set,i)=><div key={i} style={{background:C.CARD2,border:`1px solid ${C.BORDER}`,borderRadius:8,padding:"5px 11px",fontSize:12,color:C.MUTED,fontWeight:600}}>{set.weight>0?`${set.weight}kg × ${set.reps}`:`BW × ${set.reps}`}</div>)}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── PPL WORKOUT ────────────────────────────────────────────────────────────
    const w=WORKOUTS[pplDay],dc=w.color,allEx=[...w.compounds,...w.isolations];
    const doneCount=allEx.filter(ex=>(workout[ex.name]?.length||0)>=targetSets(ex,phase)).length;
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",paddingBottom:SAB}}>
        <div style={{position:"sticky",top:0,zIndex:10,background:C.BG,borderBottom:`1px solid ${C.BORDER}`,padding:`${PAD} 20px 14px`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setShowExitModal(true)} style={{background:"transparent",border:"none",cursor:"pointer",color:C.MUTED,fontSize:24,padding:"4px 8px 4px 0",lineHeight:1,fontFamily:"inherit"}}>←</button>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#4A4A5A"}}/>
                  <div style={{fontWeight:800,fontSize:18}}>{w.label} Day</div>
                  <div style={{background:"#22222F",color:C.MUTED,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,letterSpacing:"0.1em"}}>PH{phase}</div>
                </div>
                <div style={{fontSize:11,color:C.MUTED,marginTop:2}}>{doneCount} of {allEx.length} exercises done</div>
              </div>
            </div>
            <button onClick={()=>setShowExitModal(true)} style={btn("#F0F0F4","#0E0E15",{padding:"10px 18px",fontSize:14,borderRadius:12})}>Finish ✓</button>
          </div>
          <div style={{height:3,background:"#22222F",borderRadius:2,overflow:"hidden",marginBottom:timer.on?10:0}}>
            <div style={{height:"100%",width:`${(doneCount/allEx.length)*100}%`,background:"#5A5A6A",transition:"width 0.4s"}}/>
          </div>
          {timer.on&&(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,height:4,background:"#22222F",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(timer.secs/timer.max)*100}%`,background:"#5A5A6A",transition:"width 1s linear"}}/>
              </div>
              <div style={{fontSize:15,fontWeight:800,color:C.MUTED,minWidth:38,textAlign:"right"}}>{fmtTimer(timer.secs)}</div>
              <button onClick={skipTimer} style={btn(C.CARD,C.MUTED,{fontSize:12,padding:"5px 12px",borderRadius:8})}>Skip</button>
            </div>
          )}
        </div>
        <div style={{padding:"18px 20px"}}>
          {pplDay==="legs"&&w.protocol&&(
            <div style={{background:"#1A0E0E",border:"1px solid #3D1A1A",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontSize:10,color:"#F97316",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>⚠️ Legs Protocol</div>
              {w.protocol.map((r,i)=><div key={i} style={{fontSize:12,color:"#DDB0A0",marginBottom:i<w.protocol.length-1?5:0}}>— {r}</div>)}
            </div>
          )}
          <div style={{background:C.CARD,borderLeft:"3px solid #3A3A4A",borderRadius:"0 14px 14px 0",padding:"13px 16px",marginBottom:22}}>
            <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>Warmup Ramp — First compound only</div>
            <div style={{display:"flex",gap:4,marginBottom:10}}>
              {[["50%","×8"],["70%","×5"],["85%","×3"],["→","Work"]].map(([p,r],i)=>(
                <div key={i} style={{flex:1,textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:700,color:i===3?"#C0C4D8":C.TEXT}}>{p}</div>
                  <div style={{fontSize:11,color:C.MUTED,marginTop:2}}>{r}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:C.MUTED}}>2nd compound: 2 touch sets · 3rd+: 1 light set</div>
          </div>
          <div style={{fontSize:10,letterSpacing:"0.14em",color:C.MUTED,textTransform:"uppercase",fontWeight:600,marginBottom:10}}>Compounds</div>
          {w.compounds.map(ex=>(
            <ExCard key={ex.name} ex={ex} isCompound={true} phase={phase} phaseColor={pd.color} dayColor={dc}
              loggedSets={workout[ex.name]||[]} isLogging={logging?.exName===ex.name}
              logState={logging?.exName===ex.name?logging:{weight:"",reps:""}}
              prevSets={getLastSets(sessions,pplDay,ex.name)}
              onStartLog={()=>openLogger(ex,!ex.iso&&!ex.special)}
              onChange={(f,v)=>setLogging(l=>({...l,[f]:v}))}
              onSubmit={submitSet} onCancel={()=>setLogging(null)}
              onInfo={()=>{setSelectedExInfo(ex.name);setReturnView("workout");setView("exercise-info");}}
            />
          ))}
          <div style={{fontSize:10,letterSpacing:"0.14em",color:C.MUTED,textTransform:"uppercase",fontWeight:600,marginBottom:10,marginTop:18}}>Isolations</div>
          {w.isolations.map(ex=>(
            <ExCard key={ex.name} ex={ex} isCompound={false} phase={phase} phaseColor={pd.color} dayColor={dc}
              loggedSets={workout[ex.name]||[]} isLogging={logging?.exName===ex.name}
              logState={logging?.exName===ex.name?logging:{weight:"",reps:""}}
              prevSets={getLastSets(sessions,pplDay,ex.name)}
              onStartLog={()=>openLogger(ex,false)}
              onChange={(f,v)=>setLogging(l=>({...l,[f]:v}))}
              onSubmit={submitSet} onCancel={()=>setLogging(null)}
              onInfo={()=>{setSelectedExInfo(ex.name);setReturnView("workout");setView("exercise-info");}}
            />
          ))}
        </div>
        {showExitModal&&(
          <div onClick={()=>setShowExitModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:`0 16px ${SAB}`}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#1C1C27",borderRadius:22,padding:"26px 22px",width:"100%",maxWidth:440,border:`1px solid ${C.BORDER}`}}>
              <div style={{fontWeight:800,fontSize:20,color:C.TEXT,marginBottom:8}}>Leave workout?</div>
              <div style={{fontSize:13,color:C.MUTED,marginBottom:26,lineHeight:1.5}}>You've logged {Object.values(workout).reduce((a,s)=>a+s.length,0)} sets so far.</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={finishPplWorkout} style={btn("#F0F0F4","#0E0E15",{width:"100%",padding:"16px",fontSize:16,borderRadius:14})}>Save &amp; Exit</button>
                <button onClick={()=>{setShowExitModal(false);setView("home");}} style={btn("#2A1A1A","#E07070",{width:"100%",padding:"16px",fontSize:16,borderRadius:14,border:"1px solid #4A2A2A"})}>Discard Session</button>
                <button onClick={()=>setShowExitModal(false)} style={btn("transparent",C.MUTED,{width:"100%",padding:"14px",fontSize:15,borderRadius:14})}>Cancel</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
