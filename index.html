const STORE_KEY="tracker:v4";
function loadStore(){
  try{
    const d=localStorage.getItem(STORE_KEY);
    if(!d) return {sessions:[],cardioSessions:[],activities:[],workoutConfig:{},bodyMetrics:[]};
    const p=JSON.parse(d);
    if(!p.cardioSessions) p.cardioSessions=[];
    if(!p.activities) p.activities=[];
    if(!p.workoutConfig) p.workoutConfig={};
    if(!p.bodyMetrics) p.bodyMetrics=[];
    return p;
  }catch{return {sessions:[],cardioSessions:[],activities:[],workoutConfig:{},bodyMetrics:[]};}
}

function getLastSets(sessions,day,name){
  const p=[...sessions].filter(s=>s.day===day&&s.exercises?.[name]?.length>0).sort((a,b)=>b.date.localeCompare(a.date));
  return p.length?p[0].exercises[name]:null;
}
function hitProgression(loggedSets){
  if(!loggedSets?.length) return false;
  const ws=loggedSets[0];
  return ws.weight===0?ws.reps>=BW_ADD_PLATE:(ws.reps||0)>=REP_TARGET;
}
function getRecommendedWeight(sessions,day,exName,inc){
  const past=[...sessions].filter(s=>s.day===day&&s.exercises?.[exName]?.length>0).sort((a,b)=>b.date.localeCompare(a.date));
  if(!past.length) return {type:"none",weight:null};
  const lastSets=past[0].exercises[exName];
  const lastWeight=lastSets[0]?.weight||0;
  const lastReps=lastSets[0]?.reps||0;
  if(!lastWeight){
    const avg=lastSets.reduce((a,s)=>a+(s.reps||0),0)/lastSets.length;
    return {type:"bw",avgReps:Math.round(avg*10)/10,addPlate:avg>=BW_ADD_PLATE};
  }
  if(hitProgression(lastSets)) return {type:"increase",weight:lastWeight+inc,lastWeight,lastReps,inc};
  return {type:"maintain",weight:lastWeight,lastWeight,lastReps};
}
function lastCardioSession(cs,machine){return [...cs].filter(s=>s.machine===machine).sort((a,b)=>b.ts-a.ts)[0]||null;}
function countReady(sessions,day,workoutConfig){
  const last=[...sessions].filter(s=>s.day===day).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!last) return null;
  const {compounds}=getWorkoutExercises(day,workoutConfig);
  const comps=compounds.filter(ex=>!ex.special&&!ex.iso);
  if(!comps.length) return null;
  const ready=comps.filter(ex=>hitProgression(last.exercises?.[ex.name]));
  return {ready:ready.length,total:comps.length};
}
function getWorkoutExercises(day,workoutConfig){
  const cfg=workoutConfig?.[day];
  const def=DEFAULT_CONFIG[day];
  return {compounds:(cfg?.compounds||def.compounds).map(exByName),isolations:(cfg?.isolations||def.isolations).map(exByName)};
}
function moveItem(arr,i,dir){const a=[...arr],ni=i+dir;if(ni<0||ni>=a.length)return a;[a[i],a[ni]]=[a[ni],a[i]];return a;}

function getExercisesWithData(sessions){
  const s=new Set();
  sessions.forEach(sess=>Object.keys(sess.exercises||{}).forEach(name=>{
    const sets=sess.exercises[name];
    if(sets?.length>0&&sets[0].weight>0) s.add(name);
  }));
  return[...s];
}
function getProgressData(sessions,exName){
  return sessions
    .filter(s=>s.exercises?.[exName]?.[0]?.weight>0)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .slice(-14)
    .map(s=>({date:s.date,weight:s.exercises[exName][0].weight,reps:s.exercises[exName][0].reps}));
}

function ProgressChart({data,color}){
  if(!data||data.length===0) return(
    <div style={{padding:"24px 0",textAlign:"center",color:C.MUTED,fontSize:13}}>No data yet — start logging to see your progress</div>
  );
  if(data.length===1) return(
    <div style={{padding:"16px 0",textAlign:"center"}}>
      <div style={{fontSize:22,fontWeight:800,color:color||"#D0D4E8"}}>{data[0].weight}kg</div>
      <div style={{fontSize:11,color:C.MUTED,marginTop:4}}>1 session — need more to plot a trend</div>
    </div>
  );
  const W=320,H=110,PL=34,PR=12,PT=22,PB=18;
  const weights=data.map(d=>d.weight);
  const minW=Math.min(...weights),maxW=Math.max(...weights);
  const pad=Math.max((maxW-minW)*0.15,2.5);
  const lo=minW-pad,hi=maxW+pad;
  const toX=(i)=>PL+(i/(data.length-1))*(W-PL-PR);
  const toY=(w)=>PT+(1-(w-lo)/(hi-lo))*(H-PT-PB);
  const pts=data.map((d,i)=>({...d,x:toX(i),y:toY(d.weight)}));
  const line=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=`${line} L${pts[pts.length-1].x.toFixed(1)},${H} L${pts[0].x.toFixed(1)},${H} Z`;
  const c=color||"#9093A8";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block",overflow:"visible"}}>
      <path d={area} fill={c} opacity="0.07"/>
      <path d={line} stroke={c} strokeWidth="1.5" fill="none" opacity="0.7"/>
      <text x={PL-4} y={toY(maxW)+4} textAnchor="end" fill="#44475A" fontSize="9" fontFamily="system-ui">{maxW}kg</text>
      <text x={PL-4} y={toY(minW)+4} textAnchor="end" fill="#44475A" fontSize="9" fontFamily="system-ui">{minW}kg</text>
      {pts.map((p,i)=>{
        const isLast=i===pts.length-1;
        return(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={isLast?5:3} fill={isLast?c:"#1C1C27"} stroke={c} strokeWidth={isLast?0:1.5}/>
            {isLast&&<text x={p.x} y={p.y-10} textAnchor="middle" fill={c} fontSize="11" fontWeight="700" fontFamily="system-ui">{p.weight}kg</text>}
          </g>
        );
      })}
      {data.length>1&&(
        <>
          <text x={pts[0].x} y={H+2} textAnchor="middle" fill="#44475A" fontSize="9" fontFamily="system-ui">{data[0].date.slice(5)}</text>
          <text x={pts[pts.length-1].x} y={H+2} textAnchor="middle" fill="#44475A" fontSize="9" fontFamily="system-ui">{data[data.length-1].date.slice(5)}</text>
        </>
      )}
    </svg>
  );
}

  const allDone=exercises.every((_,i)=>checked[i]);

  useEffect(()=>{if(allDone&&exercises.length>0){const t=setTimeout(()=>setCollapsed(true),700);return()=>clearTimeout(t);}},[allDone]);

    <div style={{background:C.CARD,borderRadius:14,marginBottom:12,overflow:"hidden",border:`1px solid ${C.BORDER}`}}>
      <div onClick={()=>setCollapsed(!collapsed)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:allDone?"#C0C4D8":C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>{allDone?"WARMUP COMPLETE":"PRE-WORKOUT WARMUP"}</div>
          <div style={{fontSize:12,color:allDone?"#888":"#55586A",marginTop:1}}>{allDone?"You're warm - let's go.":collapsed?`${doneCount}/${exercises.length} done`:`${exercises.length} exercises`}</div>
        </div>
        <div style={{color:C.MUTED,fontSize:12}}>{collapsed?"▼":"▲"}</div>
      </div>
      {!collapsed&&(
        <div style={{borderTop:`1px solid ${C.BORDER}`}}>
          {exercises.map((ex,i)=>(
            <div key={i} onClick={()=>toggle(i)} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"11px 16px",cursor:"pointer",borderBottom:i<exercises.length-1?`1px solid ${C.BORDER}`:"none",background:checked[i]?"#111114":"transparent"}}>
              <div style={{width:20,height:20,borderRadius:6,flexShrink:0,marginTop:1,background:checked[i]?"#F0F0F4":"transparent",border:`1.5px solid ${checked[i]?"#F0F0F4":"#3A3A4A"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {checked[i]&&<div style={{fontSize:11,color:"#0E0E15",fontWeight:800}}>✓</div>}
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                  <div style={{fontWeight:600,fontSize:14,color:checked[i]?"#555":C.TEXT,textDecoration:checked[i]?"line-through":"none"}}>{ex.name}</div>
                  <div style={{fontSize:11,color:C.MUTED,flexShrink:0}}>{ex.sets}</div>
                </div>
                {ex.note&&<div style={{fontSize:11,color:checked[i]?"#3A3A3A":"#55586A",marginTop:2,lineHeight:1.4}}>{ex.note}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SessionTargets({compounds,isolations,sessions,day}){
  const [collapsed,setCollapsed]=useState(false);
  const renderRow=(ex,rec,isLast)=>{
    const bdr=isLast?{}:{borderBottom:`1px solid ${C.BORDER}`};
    if(rec.type==="none") return(
      <div key={ex.name} style={{padding:"10px 16px",...bdr}}>
        <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:1}}>{ex.name}</div>
        <div style={{fontSize:11,color:"#44475A"}}>First session - start conservatively</div>
      </div>
    );
    if(rec.type==="bw") return(
      <div key={ex.name} style={{padding:"10px 16px",...bdr}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:1}}>
          <div style={{fontSize:13,fontWeight:600,color:C.TEXT,flex:1,marginRight:8}}>{ex.name}</div>
          <div style={{fontSize:15,fontWeight:800,color:rec.addPlate?"#D0D4E8":"#9093A8"}}>{rec.addPlate?"Up Add plate":"Bodyweight"}</div>
        </div>
        <div style={{fontSize:11,color:"#55586A"}}>{rec.addPlate?`Avg ${rec.avgReps} reps - add 2.5kg plate`:`Last avg: ${rec.avgReps} reps - target ${BW_ADD_PLATE}+ to add plate`}</div>
      </div>
    );
    return(
      <div key={ex.name} style={{padding:"10px 16px",...bdr}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:1}}>
          <div style={{fontSize:13,fontWeight:600,color:C.TEXT,flex:1,marginRight:8}}>{ex.name}</div>
          <div style={{fontSize:17,fontWeight:800,color:rec.type==="increase"?"#D0D4E8":"#9093A8"}}>{rec.type==="increase"?"↑ ":""}{rec.weight}kg</div>
        </div>
        <div style={{fontSize:11,color:"#55586A"}}>
          {rec.type==="increase"&&`Up ${rec.inc}kg - last ${rec.lastWeight}kg × ${rec.lastReps} reps`}
          {rec.type==="maintain"&&`Hold - last ${rec.lastReps} reps - need ${REP_TARGET} to progress`}
        </div>
      </div>
    );
  };
  const allRecs=[...compounds.map(e=>({e,rec:getRecommendedWeight(sessions,day,e.name,5)})),...isolations.map(e=>({e,rec:getRecommendedWeight(sessions,day,e.name,2.5)}))];
  const upCount=allRecs.filter(r=>r.rec.type==="increase"||(r.rec.type==="bw"&&r.rec.addPlate)).length;
  const allNone=allRecs.every(r=>r.rec.type==="none");
  const subtext=collapsed?(allNone?"First session - start conservatively":upCount>0?`${upCount} ready to progress`:"Tap to review"):"Target weights for today";
  return(
    <div style={{background:C.CARD,borderRadius:14,marginBottom:12,overflow:"hidden",border:`1px solid ${C.BORDER}`}}>
      <div onClick={()=>setCollapsed(!collapsed)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>SESSION TARGETS</div>
          <div style={{fontSize:12,color:"#55586A",marginTop:1}}>{subtext}</div>
        </div>
        <div style={{color:C.MUTED,fontSize:12}}>{collapsed?"▼":"▲"}</div>
      </div>
      {!collapsed&&(
        <div style={{borderTop:`1px solid ${C.BORDER}`}}>
          {compounds.length>0&&<div style={{padding:"6px 16px 2px",fontSize:9,color:"#44475A",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Compounds</div>}
          {compounds.map((ex,i)=>renderRow(ex,getRecommendedWeight(sessions,day,ex.name,5),i===compounds.length-1&&isolations.length===0))}
          {isolations.length>0&&<div style={{padding:"6px 16px 2px",borderTop:`1px solid ${C.BORDER}`,fontSize:9,color:"#44475A",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Isolations</div>}
          {isolations.map((ex,i)=>renderRow(ex,getRecommendedWeight(sessions,day,ex.name,2.5),i===isolations.length-1))}
        </div>
      )}
    </div>
  );
}

function ExCard({ex,loggedSets,isLogging,logState,prevSets,rec,onStartLog,onChange,onSubmit,onCancel,onInfo,editingSet,onEditSet,onEditChange,onEditSubmit,onEditCancel}){
  const isCompound=!ex.iso;
  const workingSet=loggedSets?.[0];
  const hasWS=loggedSets?.length>=1;
  const wReps=workingSet?.reps||0;
  const hitTarget=workingSet&&(workingSet.weight===0?wReps>=BW_ADD_PLATE:wReps>=REP_TARGET);
  const canAdd=hasWS&&hitTarget&&!isLogging;
  const isEditingThis=editingSet?.exName===ex.name;
  let prog=null;
  if(workingSet){
    if(workingSet.weight===0) prog=wReps>=BW_ADD_PLATE?{ready:true,msg:"Consider adding plate",sub:`${wReps} reps - strong set`}:{ready:false,msg:"Keep building",sub:`${wReps} reps - target ${BW_ADD_PLATE}+ for plate`};
    else prog=wReps>=REP_TARGET?{ready:true,msg:"Add weight next session",sub:`${wReps} reps - progression earned`}:{ready:false,msg:"Keep building at this weight",sub:`${wReps} reps - target ${REP_TARGET} to progress`};
  }
  return(
    <div style={{background:hasWS?"#141418":isCompound?C.CARD:C.CARD2,borderRadius:14,marginBottom:10,overflow:"hidden",border:`1px solid ${hasWS?"#333340":isCompound?C.BORDER:"#22222F"}`}}>
      <div style={{padding:"13px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:isCompound?700:600,fontSize:isCompound?15:14,lineHeight:1.3,color:hasWS?"#C0C4D8":C.TEXT}}>{hasWS?"✓ ":""}{ex.name}</div>
            <button onClick={onInfo} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,color:C.MUTED,fontWeight:600,padding:"3px 0 0",fontFamily:"inherit",letterSpacing:"0.04em",display:"block"}}>i Details</button>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            {rec?.type==="none"&&<div style={{fontSize:11,color:"#44475A"}}>Start light</div>}
            {rec?.type==="bw"&&<div><div style={{fontSize:13,fontWeight:800,color:rec.addPlate?"#D0D4E8":"#9093A8"}}>{rec.addPlate?"+ Add plate":`${rec.avgReps} last`}</div><div style={{fontSize:9,color:C.MUTED,marginTop:1}}>target</div></div>}
            {(rec?.type==="increase"||rec?.type==="maintain")&&<div><div style={{fontSize:16,fontWeight:800,color:rec.type==="increase"?"#D0D4E8":"#9093A8"}}>{rec.type==="increase"?"+ ":""}{rec.weight}kg</div><div style={{fontSize:9,color:C.MUTED,marginTop:1}}>target</div></div>}
          </div>
        </div>
        {prevSets?.length>0&&(
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginTop:8}}>
            <div style={{fontSize:10,color:"#44475A",fontWeight:700,letterSpacing:"0.1em",flexShrink:0}}>LAST</div>
            {prevSets.map((s,i)=><div key={i} style={{fontSize:11,color:"#44475A"}}>{s.weight>0?`${s.weight}kg × ${s.reps}`:`BW × ${s.reps}`}{i<prevSets.length-1?" ·":""}</div>)}
          </div>
        )}
        {loggedSets?.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
            {loggedSets.map((s,i)=>{
              const isES=isEditingThis&&editingSet?.index===i;
              return(
                <div key={i} onClick={()=>!isES&&onEditSet(i)} style={{background:isES?"#22222F":"#1E1E26",border:`1px solid ${isES?"#5A5A6A":"#333340"}`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:isES?"#F0F0F4":"#C0C4D8",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:9,color:"#55586A",fontWeight:400}}>{i===0?"WS":`+${i}`}</span>
                  {s.weight>0?`${s.weight}kg × ${s.reps}`:`BW × ${s.reps}`}
                  {!isES&&<span style={{fontSize:9,color:C.MUTED,opacity:0.5}}>e</span>}
                </div>
              );
            })}
          </div>
        )}
        {!hasWS&&!isLogging&&<div style={{marginTop:10}}><div style={{border:`1px dashed ${C.BORDER}`,borderRadius:8,padding:"5px 14px",fontSize:12,color:C.MUTED,display:"inline-block"}}>Working Set</div></div>}
        {isEditingThis&&(
          <div style={{marginTop:12,padding:"12px 0 0",borderTop:`1px solid ${C.BORDER}`}}>
            <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.06em",marginBottom:8}}>EDITING SET {editingSet.index+1}</div>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              {[{lbl:"WEIGHT (kg)",field:"weight",mode:"decimal"},{lbl:"REPS",field:"reps",mode:"numeric"}].map(({lbl,field,mode})=>(
                <div key={field} style={{flex:1}}>
                  <div style={{fontSize:10,color:C.MUTED,marginBottom:4,letterSpacing:"0.1em"}}>{lbl}</div>
                  <input type="number" inputMode={mode} value={editingSet[field]} onChange={e=>onEditChange(field,e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,background:C.CARD,border:"1.5px solid #3A3A4A",color:C.TEXT,fontSize:20,fontWeight:800,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={onEditSubmit} style={btn("#F0F0F4","#0E0E15",{flex:1,padding:"10px",fontSize:14,borderRadius:10})}>Save</button>
              <button onClick={onEditCancel} style={btn(C.CARD,C.MUTED,{padding:"10px 14px",fontSize:14,border:`1px solid ${C.BORDER}`,borderRadius:10})}>X</button>
            </div>
          </div>
        )}
      </div>
      {prog&&(
        <div style={{padding:"10px 16px",borderTop:`1px solid ${prog.ready?"#2E2E3E":"#222"}`,background:prog.ready?"#111116":"#111",display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:15,color:prog.ready?"#D0D4E8":"#555"}}>{prog.ready?"^":"o"}</div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:prog.ready?"#D0D4E8":"#555"}}>{prog.msg}</div>
            <div style={{fontSize:11,color:prog.ready?"#6B6F82":"#3A3A3A",marginTop:1}}>{prog.sub}</div>
          </div>
        </div>
      )}
      {isLogging&&(
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.BORDER}`,background:"#111118"}}>
          <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.06em",marginBottom:10}}>{hasWS?"ADD SET":"WORKING SET"}</div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            {[{lbl:"WEIGHT (kg)",field:"weight",mode:"decimal"},{lbl:"REPS",field:"reps",mode:"numeric"}].map(({lbl,field,mode})=>(
              <div key={field} style={{flex:1}}>
                <div style={{fontSize:10,color:C.MUTED,marginBottom:4,letterSpacing:"0.1em"}}>{lbl}</div>
                <input type="number" inputMode={mode} value={logState[field]} onChange={e=>onChange(field,e.target.value)} placeholder="0" style={{width:"100%",padding:"11px 12px",borderRadius:12,background:C.CARD,border:"1.5px solid #3A3A4A",color:C.TEXT,fontSize:22,fontWeight:800,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onSubmit} style={btn("#F0F0F4","#0E0E15",{flex:1,padding:"12px",fontSize:14,borderRadius:12})}>Log</button>
            <button onClick={onCancel} style={btn(C.CARD,C.MUTED,{padding:"12px 14px",fontSize:14,border:`1px solid ${C.BORDER}`,borderRadius:12})}>X</button>
          </div>
        </div>
      )}
      {!isLogging&&!isEditingThis&&(
        <div style={{padding:"0 16px 12px"}}>
          {!hasWS&&<button onClick={onStartLog} style={btn("transparent",C.MUTED,{width:"100%",padding:"9px",fontSize:13,border:"1px solid #3A3A4A",borderRadius:12})}>Log Working Set</button>}
          {canAdd&&<button onClick={onStartLog} style={btn("transparent","#D0D4E8",{width:"100%",padding:"9px",fontSize:12,border:"1px solid #3A3A4A",borderRadius:12,marginTop:6})}>+ Add Set (hit {REP_TARGET} reps)</button>}
        </div>
      )}
    </div>
  );
}

function App(){
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const userRef=useRef(null);
  const [sessions,setSessions]=useState([]);
  const [cardioSessions,setCardioSessions]=useState([]);
  const [activities,setActivities]=useState([]);
  const [workoutConfig,setWorkoutConfig]=useState({});
  const [view,setView]=useState("main");
  const [pplDay,setPplDay]=useState(null);
  const [workout,setWorkout]=useState({});
  const [logging,setLogging]=useState(null);
  const [editingSet,setEditingSet]=useState(null);
  const [timer,setTimer]=useState({on:false,secs:0,max:0});
  const [histOpen,setHistOpen]=useState(null);
  const [showExitModal,setShowExitModal]=useState(false);
  const [selectedExInfo,setSelectedExInfo]=useState(null);
  const [returnView,setReturnView]=useState("home");
  const [cardioMachine,setCardioMachine]=useState(null);
  const [cardioBlocks,setCardioBlocks]=useState([]);
  const [cardioLogging,setCardioLogging]=useState(false);
  const [cardioLogState,setCardioLogState]=useState({});
  const [cardioHistOpen,setCardioHistOpen]=useState(null);
  const [showCardioExitModal,setShowCardioExitModal]=useState(false);
  const [libraryContext,setLibraryContext]=useState(null);
  const [libCat,setLibCat]=useState("Chest");
  const [libSearch,setLibSearch]=useState("");
  const [manageDay,setManageDay]=useState(null);
  const [customExs,setCustomExs]=useState({compounds:[],isolations:[]});
  const [bodyMetrics,setBodyMetrics]=useState([]);
  const [bodyForm,setBodyForm]=useState({weight:"",bodyFat:""});
  const [showBodyLog,setShowBodyLog]=useState(false);
  const [selectedProgressEx,setSelectedProgressEx]=useState(null);
  const [actForm,setActForm]=useState({name:"",duration:"",intensity:"medium",notes:""});
  const [actHistOpen,setActHistOpen]=useState(null);
  const tickRef=useRef(null);

  useEffect(()=>{
    // Handle redirect result first (after Google redirects back to the app)
    _auth.getRedirectResult().catch(e=>console.error("Redirect result:",e));

    const unsub=_auth.onAuthStateChanged(async(u)=>{
      setUser(u);userRef.current=u;
      if(u){
        // Load from Firestore first, fall back to localStorage
        const cloud=await loadFromFirebase(u.uid);
        const local=loadStore();
        const data=cloud||local;
        // Migrate existing localStorage data to cloud on first sign-in
        if(!cloud&&(local.sessions?.length>0||local.activities?.length>0)){
          saveToFirebase(u.uid,local);
        }
        setSessions(data.sessions||[]);
        setCardioSessions(data.cardioSessions||[]);
        setActivities(data.activities||[]);
        setWorkoutConfig(data.workoutConfig||{});
        setBodyMetrics(data.bodyMetrics||[]);
        saveStore(data);
        setReady(true);
      }
      setAuthLoading(false);
    });
    return()=>unsub();
  },[]);

  const persist=(updates)=>{
    const cur=loadStore();
    const newData={...cur,...updates};
    saveStore(newData);
    if(userRef.current) saveToFirebase(userRef.current.uid,newData);
  };

  const signInWithGoogle=async()=>{
    const provider=new firebase.auth.GoogleAuthProvider();
    try{await _auth.signInWithRedirect(provider);}
    catch(e){console.error("Sign-in error:",e);}
  };
  const signOut=async()=>{await _auth.signOut();setReady(false);setUser(null);};

  useEffect(()=>{
    if(timer.on&&timer.secs>0) tickRef.current=setTimeout(()=>setTimer(t=>({...t,secs:t.secs-1})),1000);
    else if(timer.on&&timer.secs===0) setTimer(t=>({...t,on:false}));
    return()=>clearTimeout(tickRef.current);
  },[timer.on,timer.secs]);
  const skipTimer=()=>{clearTimeout(tickRef.current);setTimer({on:false,secs:0,max:0});};
  const startTimer=()=>setTimer({on:true,secs:90,max:90});

  const getConfig=(day)=>({
    compounds:(workoutConfig[day]?.compounds||DEFAULT_CONFIG[day].compounds),
    isolations:(workoutConfig[day]?.isolations||DEFAULT_CONFIG[day].isolations),
  });
  const updateConfig=(day,section,names)=>{
    const nc={...workoutConfig,[day]:{...getConfig(day),[section]:names}};
    setWorkoutConfig(nc);persist({workoutConfig:nc});
  };

  const startPplWorkout=(d)=>{setPplDay(d);setWorkout({});setLogging(null);setEditingSet(null);setShowExitModal(false);skipTimer();setView("workout");};
  const openLogger=(ex,inc)=>{
    const rec=getRecommendedWeight(sessions,pplDay||"custom",ex.name,inc);
    const lw=rec?.weight&&rec.weight>0?String(rec.weight):(getLastSets(sessions,pplDay||"custom",ex.name)?.[0]?.weight||"");
    setEditingSet(null);setLogging({exName:ex.name,weight:lw?String(lw):"",reps:""});
  };
  const submitSet=()=>{
    if(!logging) return;
    const {exName,weight,reps}=logging;
    setWorkout(p=>({...p,[exName]:[...(p[exName]||[]),{weight:parseFloat(weight)||0,reps:parseInt(reps)||0}]}));
    setLogging(null);startTimer();
  };
  const openEditSet=(exName,index)=>{
    const set=workout[exName]?.[index];if(!set) return;
    setLogging(null);setEditingSet({exName,index,weight:String(set.weight),reps:String(set.reps)});
  };
  const submitEditSet=()=>{
    if(!editingSet) return;
    const {exName,index,weight,reps}=editingSet;
    setWorkout(p=>{const s=[...(p[exName]||[])];s[index]={weight:parseFloat(weight)||0,reps:parseInt(reps)||0};return{...p,[exName]:s};});
    setEditingSet(null);
  };
  const finishWorkout=(day)=>{
    const sess={id:`${todayStr()}-${day}-${Date.now()}`,date:todayStr(),day,exercises:workout,ts:Date.now()};
    const updated=[...sessions,sess];setSessions(updated);persist({sessions:updated});
    skipTimer();setShowExitModal(false);setView(day==="custom"?"main":"home");
  };

  const startCardio=(machine)=>{setCardioMachine(machine);setCardioBlocks([]);setCardioLogging(false);setCardioLogState({});setShowCardioExitModal(false);setView("cardio-session");};
  const openCardioLogger=()=>{const f={};CARDIO[cardioMachine].fields.forEach(x=>{f[x.key]="";});setCardioLogState(f);setCardioLogging(true);};
  const submitCardioBlock=()=>{const b={...cardioLogState};Object.keys(b).forEach(k=>{b[k]=parseFloat(b[k])||0;});setCardioBlocks(p=>[...p,b]);setCardioLogging(false);};
  const finishCardio=()=>{
    const sess={id:`${todayStr()}-${cardioMachine}-${Date.now()}`,date:todayStr(),machine:cardioMachine,blocks:cardioBlocks,ts:Date.now()};
    const updated=[...cardioSessions,sess];setCardioSessions(updated);persist({cardioSessions:updated});
    setShowCardioExitModal(false);setView("cardio-home");
  };

  const saveActivity=()=>{
    if(!actForm.name||!actForm.duration) return;
    const act={id:Date.now(),date:todayStr(),name:actForm.name,duration:parseFloat(actForm.duration)||0,intensity:actForm.intensity,notes:actForm.notes,ts:Date.now()};
    const updated=[...activities,act];setActivities(updated);persist({activities:updated});
    setActForm({name:"",duration:"",intensity:"medium",notes:""});setView("activities");
  };

  const saveBodyMetric=()=>{
    if(!bodyForm.weight) return;
    const entry={id:Date.now(),date:todayStr(),weight:parseFloat(bodyForm.weight)||0,bodyFat:bodyForm.bodyFat?parseFloat(bodyForm.bodyFat):null,ts:Date.now()};
    const updated=[...bodyMetrics,entry];setBodyMetrics(updated);persist({bodyMetrics:updated});
    setBodyForm({weight:"",bodyFat:""});setShowBodyLog(false);
  };

  const openLibrary=(ctx)=>{setLibraryContext(ctx);setLibCat("Chest");setLibSearch("");setView("library");};
  const isInWorkout=(name,day,section)=>getConfig(day)[section].includes(name);
  const toggleExInWorkout=(name,day,section)=>{
    const cur=getConfig(day)[section];
    updateConfig(day,section,cur.includes(name)?cur.filter(n=>n!==name):[...cur,name]);
  };
  const addToCustom=(name,section)=>setCustomExs(p=>p[section].includes(name)?p:{...p,[section]:[...p[section],name]});
  const moveEx=(day,section,i,dir)=>updateConfig(day,section,moveItem(getConfig(day)[section],i,dir));
  const removeEx=(day,section,name)=>updateConfig(day,section,getConfig(day)[section].filter(n=>n!==name));
  const resetToDefault=(day)=>{const nc={...workoutConfig};delete nc[day];setWorkoutConfig(nc);persist({workoutConfig:nc});};

  const exCardProps=(ex,day,inc)=>({
    ex,loggedSets:workout[ex.name]||[],isLogging:logging?.exName===ex.name,
    logState:logging?.exName===ex.name?logging:{weight:"",reps:""},
    prevSets:getLastSets(sessions,day,ex.name),rec:getRecommendedWeight(sessions,day,ex.name,inc),
    onStartLog:()=>openLogger(ex,inc),onChange:(f,v)=>setLogging(l=>({...l,[f]:v})),
    onSubmit:submitSet,onCancel:()=>setLogging(null),
    onInfo:()=>{setSelectedExInfo(ex.name);setReturnView(view);setView("exercise-info");},
    editingSet:editingSet?.exName===ex.name?editingSet:null,
    onEditSet:(i)=>openEditSet(ex.name,i),onEditChange:(f,v)=>setEditingSet(s=>({...s,[f]:v})),
    onEditSubmit:submitEditSet,onEditCancel:()=>setEditingSet(null),
  });

  if(authLoading) return(
    <div style={{background:C.BG,minHeight:"100svh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:32}}>💪</div>
      <div style={{color:C.MUTED,fontSize:14}}>Loading...</div>
    </div>

  if(!user) return(
    <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 32px",textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:20}}>💪</div>
      <div style={{fontSize:10,color:C.MUTED,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:8}}>Workout Tracker</div>
      <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.025em",marginBottom:12}}>Your gym, tracked.</div>
      <div style={{fontSize:14,color:C.MUTED,lineHeight:1.6,marginBottom:40}}>Sign in with Google to save your sessions, progress and body metrics — synced across all your devices.</div>

        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
  );

  if(!ready) return(
    <div style={{background:C.BG,minHeight:"100svh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:32}}>💪</div>
      <div style={{color:C.MUTED,fontSize:14}}>Loading your data...</div>
    </div>
  );

  if(view==="exercise-info"&&selectedExInfo){
    const exObj=exByName(selectedExInfo);
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px 32px`,overflowY:"auto"}}>
        <div style={{fontSize:11,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>EXERCISE GUIDE</div>
        <div style={{fontSize:24,fontWeight:800,marginBottom:20}}>{selectedExInfo}</div>
        {exObj?.warmup&&<div style={{background:C.CARD,borderRadius:14,padding:"14px 18px",border:`1px solid ${C.BORDER}`,marginBottom:12}}><div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>WARMUP</div><div style={{fontSize:14,color:"#D0D0D8",lineHeight:1.5}}>{exObj.warmup}</div></div>}
        {exObj?.note&&<div style={{background:C.CARD,borderRadius:14,padding:"14px 18px",border:`1px solid ${C.BORDER}`,marginBottom:12}}><div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>NOTE</div><div style={{fontSize:14,color:"#D0D0D8",lineHeight:1.5}}>{exObj.note}</div></div>}
        <div style={{background:C.CARD,borderRadius:14,padding:"14px 18px",border:`1px solid ${C.BORDER}`,marginBottom:12}}>
          <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:8}}>INFO</div>
          <div style={{fontSize:13,color:"#D0D0D8"}}>Category: {exObj.cat} | Equipment: {exObj.eq} | Type: {exObj.type}</div>
        </div>
        <button onClick={()=>setView(returnView)} style={btn("#F0F0F4","#0E0E15",{width:"100%",padding:"16px",fontSize:15,borderRadius:14,marginTop:8})}>Return to Workout</button>
      </div>
    );
  }

  if(view==="library"){
    const ctx=libraryContext;
    const filteredExs = libSearch
      ? DIRECTORY.filter(e=>e.name.toLowerCase().includes(libSearch.toLowerCase()))
      : DIRECTORY.filter(e=>e.cat===libCat);
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",paddingBottom:SAB}}>
        <div style={{position:"sticky",top:0,zIndex:10,background:C.BG,borderBottom:`1px solid ${C.BORDER}`,padding:`${PAD} 20px 12px`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <button onClick={()=>setView(ctx?.prev||"main")} style={{background:"transparent",border:"none",cursor:"pointer",color:C.MUTED,fontSize:20,padding:"0 8px 0 0",lineHeight:1,fontFamily:"inherit"}}>←</button>
            <div style={{fontWeight:800,fontSize:17}}>{ctx?.mode==="custom"?"Add to Choose Your Own Journey":ctx?.day?`Add to ${WORKOUT_META[ctx.day]?.label||ctx.day}`:"Exercise Library"}</div>
          </div>
          <input type="text" placeholder="Search exercises..." value={libSearch} onChange={e=>setLibSearch(e.target.value)}
            style={{width:"100%",padding:"10px 14px",borderRadius:12,background:C.CARD,border:`1px solid ${C.BORDER}`,color:C.TEXT,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
          {!libSearch&&(
            <div style={{display:"flex",gap:6,marginTop:10,overflowX:"auto",paddingBottom:2}}>
              {DIR_CATS.map(cat=>(
                <button key={cat} onClick={()=>setLibCat(cat)} style={btn(cat===libCat?"#F0F0F4":C.CARD,cat===libCat?"#0E0E15":C.MUTED,{padding:"6px 12px",fontSize:12,borderRadius:20,flexShrink:0,border:`1px solid ${cat===libCat?"#F0F0F4":C.BORDER}`})}>{cat}</button>
              ))}
            </div>
          )}
        </div>
        <div style={{padding:"12px 20px"}}>
          {filteredExs.map(ex=>{
            let actions=[];
            if(ctx?.mode==="custom"){
              actions=[
                {label:customExs.compounds.includes(ex.name)?"In Compounds":"+ Compound",active:customExs.compounds.includes(ex.name),onClick:()=>addToCustom(ex.name,"compounds")},
                {label:customExs.isolations.includes(ex.name)?"In Isolations":"+ Isolation",active:customExs.isolations.includes(ex.name),onClick:()=>addToCustom(ex.name,"isolations")},
              ];
            } else if(ctx?.day){
              actions=[
                {label:isInWorkout(ex.name,ctx.day,"compounds")?"In Compounds":"+ Compound",active:isInWorkout(ex.name,ctx.day,"compounds"),onClick:()=>toggleExInWorkout(ex.name,ctx.day,"compounds")},
                {label:isInWorkout(ex.name,ctx.day,"isolations")?"In Isolations":"+ Isolation",active:isInWorkout(ex.name,ctx.day,"isolations"),onClick:()=>toggleExInWorkout(ex.name,ctx.day,"isolations")},
              ];
            }
            return(
              <div key={ex.name} style={{background:C.CARD,borderRadius:14,marginBottom:8,padding:"12px 14px",border:`1px solid ${C.BORDER}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:actions.length?8:0}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14,color:C.TEXT}}>{ex.name}</div>
                    <div style={{fontSize:11,color:C.MUTED,marginTop:2}}>{ex.cat} | {ex.eq} | {ex.type}</div>
                  </div>
                  <button onClick={()=>{setSelectedExInfo(ex.name);setReturnView("library");setView("exercise-info");}} style={btn("transparent",C.MUTED,{fontSize:11,padding:"2px 0"})}>i</button>
                </div>
                {actions.length>0&&(
                  <div style={{display:"flex",gap:6}}>
                    {actions.map((a,ai)=>(
                      <button key={ai} onClick={a.onClick} style={btn(a.active?"#2A3A2A":"#1A1A26",a.active?"#5ABF5A":C.MUTED,{fontSize:11,padding:"5px 10px",borderRadius:8,border:`1px solid ${a.active?"#3A5A3A":C.BORDER}`})}>{a.label}</button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
          {filteredExs.length===0&&<div style={{color:C.MUTED,fontSize:14,textAlign:"center",paddingTop:40}}>No exercises found</div>}
        </div>
      </div>
    );
  }

  if(view==="manage"&&manageDay){
    const meta=WORKOUT_META[manageDay];
    const cfg=getConfig(manageDay);
    const renderSection=(section,label)=>(
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase"}}>{label}</div>
          <button onClick={()=>openLibrary({day:manageDay,section,prev:"manage"})} style={btn(C.CARD2,C.MUTED,{fontSize:11,padding:"5px 10px",borderRadius:8,border:`1px solid ${C.BORDER}`})}>+ Add</button>
        </div>
        {cfg[section].map((name,i)=>(
          <div key={name} style={{background:C.CARD,borderRadius:12,marginBottom:6,padding:"11px 14px",border:`1px solid ${C.BORDER}`,display:"flex",alignItems:"center",gap:10}}>

            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>moveEx(manageDay,section,i,-1)} disabled={i===0} style={{...btn(C.CARD2,C.MUTED,{fontSize:14,padding:"4px 8px",borderRadius:6,border:`1px solid ${C.BORDER}`}),opacity:i===0?0.4:1}}>up</button>
              <button onClick={()=>moveEx(manageDay,section,i,1)} disabled={i===cfg[section].length-1} style={{...btn(C.CARD2,C.MUTED,{fontSize:14,padding:"4px 8px",borderRadius:6,border:`1px solid ${C.BORDER}`}),opacity:i===cfg[section].length-1?0.4:1}}>dn</button>
              <button onClick={()=>removeEx(manageDay,section,name)} style={btn(C.CARD2,"#E07070",{fontSize:12,padding:"4px 8px",borderRadius:6,border:"1px solid #4A2A2A"})}>X</button>
            </div>
          </div>
        ))}
        {cfg[section].length===0&&<div style={{color:C.MUTED,fontSize:13,padding:"10px 0"}}>No exercises - tap + Add</div>}
      </div>
    );
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        <button onClick={()=>setView("home")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 16px"})}>←</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div>
            <div style={{fontSize:10,color:C.MUTED,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}>Manage Workout</div>
            <div style={{fontSize:22,fontWeight:800,color:meta.color}}>{meta.label}</div>
          </div>
          <button onClick={()=>resetToDefault(manageDay)} style={btn("transparent",C.MUTED,{fontSize:11,padding:"6px 10px",border:`1px solid ${C.BORDER}`,borderRadius:8})}>Reset</button>
        </div>
        {renderSection("compounds","Compounds")}
        {renderSection("isolations","Isolations")}
      </div>
    );
  }

  if(view==="activities"){
    const ic={low:"#9093A8",medium:"#FBBF24",high:"#F97316"};
    const sorted=[...activities].sort((a,b)=>b.ts-a.ts);
    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        <button onClick={()=>setView("main")} style={btn("transparent",C.MUTED,{fontSize:14,padding:"0 0 16px"})}>←</button>
        <div style={{fontSize:10,color:C.MUTED,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}>Activities</div>
        <div style={{fontSize:24,fontWeight:800,color:"#F59E0B",marginBottom:20}}>Log &amp; History</div>

        {/* Log form */}
        <div style={{background:C.CARD,borderRadius:16,padding:"16px",border:`1px solid ${C.BORDER}`,marginBottom:24}}>
          <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>Log New Activity</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {ACTIVITY_PRESETS.map(p=>(
              <button key={p} onClick={()=>setActForm(f=>({...f,name:p}))} style={btn(actForm.name===p?"#F0F0F4":C.CARD2,actForm.name===p?"#0E0E15":C.MUTED,{fontSize:11,padding:"5px 10px",borderRadius:16,border:`1px solid ${actForm.name===p?"#F0F0F4":C.BORDER}`})}>{p}</button>
            ))}
          </div>
          <input type="text" placeholder="Or type custom activity..." value={actForm.name} onChange={e=>setActForm(f=>({...f,name:e.target.value}))}
            style={{width:"100%",padding:"10px 12px",borderRadius:10,background:C.CARD2,border:`1px solid ${C.BORDER}`,color:C.TEXT,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:C.MUTED,marginBottom:4,letterSpacing:"0.1em"}}>DURATION (min)</div>
              <input type="number" inputMode="decimal" placeholder="e.g. 90" value={actForm.duration} onChange={e=>setActForm(f=>({...f,duration:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",borderRadius:10,background:C.CARD2,border:`1px solid ${C.BORDER}`,color:C.TEXT,fontSize:18,fontWeight:800,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:C.MUTED,marginBottom:4,letterSpacing:"0.1em"}}>INTENSITY</div>
              <div style={{display:"flex",gap:6}}>
                {["low","med","high"].map((lvl,i)=>{
                  const full=["low","medium","high"][i];
                  return <button key={lvl} onClick={()=>setActForm(f=>({...f,intensity:full}))} style={btn(actForm.intensity===full?`${ic[full]}22`:C.CARD2,actForm.intensity===full?ic[full]:C.MUTED,{flex:1,padding:"10px 4px",fontSize:11,border:`1.5px solid ${actForm.intensity===full?ic[full]:C.BORDER}`,borderRadius:10})}>{lvl}</button>;
                })}
              </div>
            </div>
          </div>
          <input type="text" placeholder="Notes (optional)" value={actForm.notes} onChange={e=>setActForm(f=>({...f,notes:e.target.value}))}
            style={{width:"100%",padding:"10px 12px",borderRadius:10,background:C.CARD2,border:`1px solid ${C.BORDER}`,color:C.TEXT,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
          <button onClick={saveActivity} style={{...btn("#F0F0F4","#0E0E15",{width:"100%",padding:"13px",fontSize:14,borderRadius:12}),opacity:(!actForm.name||!actForm.duration)?0.4:1}}>Save Activity</button>
        </div>

        {/* History */}
        {sorted.length>0&&(

            <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:10}}>History</div>

              {sorted.map(a=>(
                <div key={a.id} style={{background:C.CARD,borderRadius:14,padding:"13px 16px",border:`1px solid ${C.BORDER}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                    <div style={{fontWeight:700,fontSize:14}}>{a.name}</div>
                    <div style={{fontSize:11,fontWeight:700,color:ic[a.intensity]||C.MUTED,textTransform:"capitalize",flexShrink:0,marginLeft:8}}>{a.intensity}</div>
                  </div>
                  <div style={{fontSize:12,color:C.MUTED}}>{fmtDate(a.date)} · {a.duration} min</div>
                  {a.notes&&<div style={{fontSize:12,color:"#55586A",marginTop:3}}>{a.notes}</div>}
                </div>
              ))}
            </div>
          </>
        )}
        {sorted.length===0&&<div style={{color:C.MUTED,fontSize:14,textAlign:"center",paddingTop:20}}>No activities logged yet.</div>}
      </div>
    );
  }

  if(view==="main"){
    const lastOf=(d)=>[...sessions].filter(s=>s.day===d).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const sortedMetrics=[...bodyMetrics].sort((a,b)=>b.ts-a.ts);
    const lastMetric=sortedMetrics[0]||null;
    const prevMetric=sortedMetrics[1]||null;
    const exWithData=getExercisesWithData(sessions);
    const activeEx=selectedProgressEx||(exWithData[0]||null);
    const progressData=activeEx?getProgressData(sessions,activeEx):[];
    const recentSessions=[...sessions].sort((a,b)=>b.ts-a.ts).slice(0,3);
    const fmtTrend=(cur,prev,unit="")=>{
      if(!prev||!cur) return null;
      const diff=(cur-prev);
      if(Math.abs(diff)<0.01) return null;
      return{val:`${diff>0?"+":""}${diff.toFixed(1)}${unit}`,up:diff>0};
    };
    const wTrend=lastMetric&&prevMetric?fmtTrend(lastMetric.weight,prevMetric.weight,"kg"):null;
    const fTrend=lastMetric?.bodyFat!=null&&prevMetric?.bodyFat!=null?fmtTrend(lastMetric.bodyFat,prevMetric.bodyFat,"%"):null;

    return(
      <div style={{background:C.BG,minHeight:"100svh",color:C.TEXT,maxWidth:480,margin:"0 auto",padding:`${PAD} 20px ${SAB}`}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
          <div>
            <div style={{fontSize:10,color:C.MUTED,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:2}}>Workout Tracker</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.02em"}}>Dashboard</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:C.MUTED}}>{new Date().toLocaleDateString("en-NZ",{weekday:"short",day:"numeric",month:"short"})}</div>
            <div style={{fontSize:11,color:"#55586A",marginTop:2}}>{sessions.length} sessions logged</div>
            <button onClick={signOut} style={{fontSize:10,color:"#55586A",background:"transparent",border:"none",cursor:"pointer",padding:"4px 0 0",fontFamily:"inherit",display:"block",marginLeft:"auto"}}>Sign out</button>
          </div>
        </div>

        {/* Body Metrics */}
        <div style={{background:C.CARD,borderRadius:16,padding:"16px",border:`1px solid ${C.BORDER}`,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Body Metrics</div>
            <button onClick={()=>setShowBodyLog(v=>!v)} style={btn(showBodyLog?"#F0F0F4":C.CARD2,showBodyLog?"#0E0E15":C.MUTED,{fontSize:11,padding:"4px 10px",border:`1px solid ${C.BORDER}`,borderRadius:8})}>
              {showBodyLog?"Cancel":"+ Log today"}
            </button>
          </div>
          {lastMetric?(
            <div style={{display:"flex",gap:16,marginBottom:showBodyLog?12:0}}>
              <div style={{flex:1}}>
                <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.02em"}}>{lastMetric.weight}<span style={{fontSize:14,fontWeight:400,color:C.MUTED,marginLeft:3}}>kg</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                  <div style={{fontSize:11,color:C.MUTED}}>Weight</div>
                  {wTrend&&<div style={{fontSize:11,fontWeight:700,color:C.MUTED}}>{wTrend.val}</div>}
                </div>
              </div>
              {lastMetric.bodyFat!=null&&(
                <div style={{flex:1}}>
                  <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.02em"}}>{lastMetric.bodyFat}<span style={{fontSize:14,fontWeight:400,color:C.MUTED,marginLeft:3}}>%</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                    <div style={{fontSize:11,color:C.MUTED}}>Body Fat</div>
                    {fTrend&&<div style={{fontSize:11,fontWeight:700,color:C.MUTED}}>{fTrend.val}</div>}
                  </div>
                </div>
              )}
            </div>
          ):(
            <div style={{fontSize:13,color:"#55586A",marginBottom:showBodyLog?12:0}}>No body metrics logged yet — tap Log today to start</div>
          )}
          {showBodyLog&&(
            <div>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                {[{lbl:"WEIGHT (kg)",field:"weight"},{lbl:"BODY FAT (%)",field:"bodyFat"}].map(({lbl,field})=>(
                  <div key={field} style={{flex:1}}>
                    <div style={{fontSize:10,color:C.MUTED,marginBottom:4,letterSpacing:"0.1em"}}>{lbl}</div>
                    <input type="number" inputMode="decimal" placeholder="0" value={bodyForm[field]} onChange={e=>setBodyForm(f=>({...f,[field]:e.target.value}))}
                      style={{width:"100%",padding:"10px 12px",borderRadius:10,background:C.CARD2,border:"1.5px solid #3A3A4A",color:C.TEXT,fontSize:18,fontWeight:800,fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
                  </div>
                ))}
              </div>
              <button onClick={saveBodyMetric} style={{...btn("#F0F0F4","#0E0E15",{width:"100%",padding:"11px",fontSize:14,borderRadius:12}),opacity:!bodyForm.weight?0.4:1}}>Save</button>

        <div style={{background:C.CARD,borderRadius:16,padding:"16px",border:`1px solid ${C.BORDER}`,marginBottom:14}}>

          {exWithData.length>0?(
            <>
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8}}>
                {exWithData.map(name=>(
                  <button key={name} onClick={()=>setSelectedProgressEx(name)} style={btn(name===activeEx?"#F0F0F4":C.CARD2,name===activeEx?"#0E0E15":C.MUTED,{fontSize:11,padding:"5px 10px",borderRadius:16,flexShrink:0,border:`1px solid ${name===activeEx?"#F0F0F4":C.BORDER}`,whiteSpace:"nowrap"})}>

            <div style={{fontSize:13,color:"#55586A",padding:"12px 0"}}>Complete your first workout to see progress charts here</div>
          )}
        </div>

        {/* Recent Sessions */}
        {recentSessions.length>0&&(
          <div style={{background:C.CARD,borderRadius:16,padding:"16px",border:`1px solid ${C.BORDER}`,marginBottom:14}}>
            <div style={{fontSize:10,color:C.MUTED,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>Recent Sessions</div>
            {recentSessions.map((s,i)=>{
              const meta=WORKOUT_META[s.day]||{label:s.day,color:C.MUTED};
              const setCount=Object.values(s.exercises||{}).reduce((a,sets)=>a+(sets?.length||0),0);
              return(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,paddingBottom:i<recentSessions.length-1?10:0,marginBottom:i<recentSessions.length-1?10:0,borderBottom:i<recentSessions.length-1?`1px solid ${C.BORDER}`:"none"}}>

                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.TEXT}}>{meta.label}</div>
